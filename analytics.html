<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hextodesign — Analytics</title>
<meta name="robots" content="noindex, nofollow">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0b;--bg1:#111113;--bg2:#1a1a1d;--bg3:#242428;--ink:#f0eeea;--ink2:#a8a5a0;--ink3:#6b6862;--brand:#E0D910;--brand-soft:rgba(224,217,16,0.12);--pos:#04AB62;--neg:#DE3B3D;--warn:#E89D00;--radius:8px;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:"SF Mono","Fira Code",monospace}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.5;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--bg1);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:40px;max-width:360px;width:100%}
.login-box h1{font-size:20px;margin-bottom:4px}
.login-box p{font-size:13px;color:var(--ink2);margin-bottom:24px}
.login-box label{font-size:12px;font-weight:600;color:var(--ink2);display:block;margin-bottom:6px}
.login-box input{width:100%;padding:10px 14px;background:var(--bg2);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:var(--ink);font-size:14px;outline:none}
.login-box input:focus{border-color:var(--brand)}
.login-box button{width:100%;margin-top:16px;padding:10px;background:var(--brand);color:#000;font-weight:600;border:none;border-radius:6px;font-size:14px;cursor:pointer}
.login-box button:hover{filter:brightness(1.1)}
.login-error{color:var(--neg);font-size:12px;margin-top:8px;display:none}

.dash{display:none;max-width:1200px;margin:0 auto;padding:24px}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.dash-header h1{font-size:22px;font-weight:700}
.dash-header .controls{display:flex;gap:8px;align-items:center}
.range-btn{padding:6px 14px;font-size:12px;font-weight:500;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:var(--bg2);color:var(--ink2);cursor:pointer;font-family:inherit}
.range-btn.active{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.logout-btn{padding:6px 14px;font-size:12px;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:var(--ink3);cursor:pointer;font-family:inherit}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi{background:var(--bg1);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:20px}
.kpi-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink3);margin-bottom:4px}
.kpi-value{font-size:28px;font-weight:700;line-height:1.2}
.kpi-sub{font-size:12px;color:var(--ink3);margin-top:4px}

.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.panels{grid-template-columns:1fr}}
.panel{background:var(--bg1);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:20px}
.panel-title{font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:14px}
.panel-full{grid-column:1/-1}

.chart-container{height:180px;position:relative}
canvas{width:100%!important;height:100%!important}

.list-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px}
.list-row:last-child{border-bottom:none}
.list-row .label{color:var(--ink2);display:flex;align-items:center;gap:8px}
.list-row .count{font-weight:600;font-family:var(--mono);font-size:12px}
.color-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.bar-bg{flex:1;height:6px;background:var(--bg3);border-radius:3px;margin:0 12px;max-width:120px}
.bar-fill{height:100%;background:var(--brand);border-radius:3px}

.empty-state{text-align:center;padding:40px 20px;color:var(--ink3);font-size:13px}
.loading{text-align:center;padding:60px;color:var(--ink3)}
.loading::after{content:"";display:block;width:24px;height:24px;margin:12px auto;border:2.5px solid var(--bg3);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <h1>Analytics</h1>
    <p>hextodesign admin dashboard</p>
    <label for="secretInput">Secret key</label>
    <input type="password" id="secretInput" placeholder="Enter analytics secret" autofocus>
    <button onclick="doLogin()">Sign in</button>
    <div class="login-error" id="loginError">Invalid secret key</div>
  </div>
</div>

<!-- Dashboard -->
<div class="dash" id="dashboard">
  <div class="dash-header">
    <h1>📊 hextodesign Analytics</h1>
    <div class="controls">
      <button class="range-btn" data-days="7">7d</button>
      <button class="range-btn active" data-days="30">30d</button>
      <button class="range-btn" data-days="60">60d</button>
      <button class="range-btn" data-days="90">90d</button>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-label">Page Views</div>
      <div class="kpi-value" id="kpiViews">—</div>
      <div class="kpi-sub" id="kpiViewsSub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Generations</div>
      <div class="kpi-value" id="kpiGens">—</div>
      <div class="kpi-sub" id="kpiGensSub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Exports</div>
      <div class="kpi-value" id="kpiExports">—</div>
      <div class="kpi-sub" id="kpiExportsSub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Copies</div>
      <div class="kpi-value" id="kpiCopies">—</div>
      <div class="kpi-sub" id="kpiCopiesSub"></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="panels">
    <div class="panel panel-full">
      <div class="panel-title">Daily Activity</div>
      <div class="chart-container"><canvas id="chartDaily"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-title">Top Colors</div>
      <div id="topColorsList"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Export Formats</div>
      <div id="exportFormatsList"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Pages</div>
      <div id="pagesList"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Devices</div>
      <div id="devicesList"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Top Fonts</div>
      <div id="fontsList"></div>
    </div>

    <div class="panel">
      <div class="panel-title">Export Type</div>
      <div id="exportTypeList"></div>
    </div>
  </div>
</div>

<!-- Chart.js from CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script>
(function() {
  "use strict";

  var secret = sessionStorage.getItem("htd_analytics_key") || "";
  var currentDays = 30;
  var chartInstance = null;

  // Check if already logged in
  if (secret) showDashboard();

  // Login
  window.doLogin = function() {
    var input = document.getElementById("secretInput");
    secret = input.value.trim();
    if (!secret) return;
    sessionStorage.setItem("htd_analytics_key", secret);
    showDashboard();
  };

  window.doLogout = function() {
    sessionStorage.removeItem("htd_analytics_key");
    secret = "";
    document.getElementById("loginScreen").style.display = "flex";
    document.getElementById("dashboard").style.display = "none";
  };

  // Enter key on input
  document.getElementById("secretInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") doLogin();
  });

  function showDashboard() {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    fetchData(currentDays);
  }

  // Range buttons
  document.querySelectorAll(".range-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".range-btn").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      currentDays = parseInt(btn.dataset.days);
      fetchData(currentDays);
    });
  });

  async function fetchData(days) {
    try {
      var res = await fetch("/api/analytics?days=" + days, {
        headers: { Authorization: "Bearer " + secret }
      });

      if (res.status === 401) {
        sessionStorage.removeItem("htd_analytics_key");
        document.getElementById("loginError").style.display = "block";
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("dashboard").style.display = "none";
        return;
      }

      var data = await res.json();
      if (data.error) throw new Error(data.error);

      renderKPIs(data);
      renderChart(data);
      renderTopColors(data.topColors || []);
      renderExportFormats(data.exports || {});
      renderPages(data.pages || {});
      renderDevices(data.devices || {});
      renderFonts(data.topFonts || []);
      renderExportTypes(data.exportTypes || {});
    } catch (err) {
      console.error("Analytics fetch error:", err);
    }
  }

  function formatNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
    if (n >= 1000) return (n / 1000).toFixed(1) + "K";
    return String(n);
  }

  function renderKPIs(data) {
    var s = data.summary || {};
    var t = data.totals || {};
    document.getElementById("kpiViews").textContent = formatNum(s.page_view || 0);
    document.getElementById("kpiGens").textContent = formatNum(s.generate || 0);
    document.getElementById("kpiExports").textContent = formatNum(s.export || 0);
    document.getElementById("kpiCopies").textContent = formatNum(s.copy || 0);

    document.getElementById("kpiViewsSub").textContent = "All time: " + formatNum(parseInt(t.page_view) || 0);
    document.getElementById("kpiGensSub").textContent = "All time: " + formatNum(parseInt(t.generate) || 0);
    document.getElementById("kpiExportsSub").textContent = "All time: " + formatNum(parseInt(t.export) || 0);
    document.getElementById("kpiCopiesSub").textContent = "All time: " + formatNum(parseInt(t.copy) || 0);
  }

  function renderChart(data) {
    var daily = data.daily || [];
    var labels = daily.map(function(d) {
      var parts = d.date.split("-");
      return parts[1] + "/" + parts[2];
    });

    var config = {
      type: "line",
      data: {
        labels: labels,
        datasets: [
          { label: "Views", data: daily.map(function(d){ return d.page_view; }), borderColor: "#8b877e", backgroundColor: "rgba(139,135,126,0.1)", tension: 0.3, borderWidth: 1.5, pointRadius: 0, fill: true },
          { label: "Generates", data: daily.map(function(d){ return d.generate; }), borderColor: "#E0D910", backgroundColor: "rgba(224,217,16,0.08)", tension: 0.3, borderWidth: 2, pointRadius: 0, fill: true },
          { label: "Exports", data: daily.map(function(d){ return d.export; }), borderColor: "#04AB62", backgroundColor: "rgba(4,171,98,0.08)", tension: 0.3, borderWidth: 1.5, pointRadius: 0, fill: true },
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: "index" },
        plugins: { legend: { display: true, position: "top", labels: { boxWidth: 10, font: { size: 11 }, color: "#8b877e" } } },
        scales: {
          x: { grid: { color: "rgba(255,255,255,0.03)" }, ticks: { font: { size: 10 }, color: "#6b6862", maxTicksLimit: 10 } },
          y: { beginAtZero: true, grid: { color: "rgba(255,255,255,0.04)" }, ticks: { font: { size: 10 }, color: "#6b6862" } }
        }
      }
    };

    if (chartInstance) chartInstance.destroy();
    var ctx = document.getElementById("chartDaily").getContext("2d");
    chartInstance = new Chart(ctx, config);
  }

  function renderList(container, items, maxItems) {
    var el = document.getElementById(container);
    if (!items || items.length === 0) {
      el.innerHTML = '<div class="empty-state">No data yet</div>';
      return;
    }
    var max = items[0].count || 1;
    var html = "";
    var limit = Math.min(items.length, maxItems || 10);
    for (var i = 0; i < limit; i++) {
      var pct = Math.round((items[i].count / max) * 100);
      var colorDot = items[i].color ? '<span class="color-dot" style="background:#' + items[i].value + '"></span>' : '';
      html += '<div class="list-row"><span class="label">' + colorDot + items[i].label + '</span><div class="bar-bg"><div class="bar-fill" style="width:' + pct + '%"></div></div><span class="count">' + formatNum(items[i].count) + '</span></div>';
    }
    el.innerHTML = html;
  }

  function renderTopColors(colors) {
    var items = colors.map(function(c) {
      return { value: c.value, label: "#" + c.value, count: c.count, color: true };
    });
    renderList("topColorsList", items, 8);
  }

  function renderExportFormats(exports) {
    var items = Object.keys(exports).map(function(k) {
      return { label: k, count: exports[k], value: k };
    }).sort(function(a, b) { return b.count - a.count; });
    renderList("exportFormatsList", items, 8);
  }

  function renderPages(pages) {
    var items = Object.keys(pages).map(function(k) {
      return { label: k, count: pages[k], value: k };
    }).sort(function(a, b) { return b.count - a.count; });
    renderList("pagesList", items, 6);
  }

  function renderDevices(devices) {
    var items = Object.keys(devices).map(function(k) {
      return { label: k, count: devices[k], value: k };
    }).sort(function(a, b) { return b.count - a.count; });
    renderList("devicesList", items, 4);
  }

  function renderFonts(fonts) {
    var items = fonts.map(function(f) {
      return { label: f.value, count: f.count, value: f.value };
    });
    renderList("fontsList", items, 8);
  }

  function renderExportTypes(types) {
    var items = Object.keys(types).map(function(k) {
      return { label: k, count: types[k], value: k };
    }).sort(function(a, b) { return b.count - a.count; });
    renderList("exportTypeList", items, 4);
  }

})();
</script>
</body>
</html>
