<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#141418"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B7FFF"/>
      <stop offset="100%" stop-color="#6B3FFF"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="200" x2="600" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B5BFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7B5BFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <ellipse cx="600" cy="350" rx="400" ry="200" fill="url(#glow)"/>

  <!-- Color swatches row -->
  <rect x="340" y="120" width="52" height="52" rx="10" fill="#EFEFFF" opacity="0.9"/>
  <rect x="400" y="120" width="52" height="52" rx="10" fill="#C4BFFF" opacity="0.9"/>
  <rect x="460" y="120" width="52" height="52" rx="10" fill="#AB9FFF" opacity="0.9"/>
  <rect x="520" y="120" width="52" height="52" rx="10" fill="#927DFF" opacity="0.9"/>
  <rect x="580" y="120" width="52" height="52" rx="10" fill="#7B5BFF" stroke="#fff" stroke-width="2" stroke-opacity="0.3"/>
  <rect x="640" y="120" width="52" height="52" rx="10" fill="#613DD6" opacity="0.9"/>
  <rect x="700" y="120" width="52" height="52" rx="10" fill="#4926AC" opacity="0.9"/>
  <rect x="760" y="120" width="52" height="52" rx="10" fill="#3517B2" opacity="0.9"/>
  <rect x="820" y="120" width="52" height="52" rx="10" fill="#210A59" opacity="0.9"/>

  <!-- 500 label under center swatch -->
  <text x="606" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7B5BFF" text-anchor="middle" font-weight="600">500</text>

  <!-- Logo -->
  <text x="600" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="56" fill="#e8e6e1" text-anchor="middle" font-weight="500" letter-spacing="-1">
    <tspan fill="#7B5BFF">#</tspan>hex<tspan fill="#7B5BFF">to</tspan>design
  </text>

  <!-- Tagline -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#8a8780" text-anchor="middle" font-weight="400">
    Paste a color, get a design system
  </text>

  <!-- Feature pills -->
  <rect x="215" y="390" width="130" height="34" rx="17" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="280" y="412" font-family="system-ui, sans-serif" font-size="13" fill="#a09d96" text-anchor="middle" font-weight="500">OKLCH Palette</text>

  <rect x="355" y="390" width="120" height="34" rx="17" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="415" y="412" font-family="system-ui, sans-serif" font-size="13" fill="#a09d96" text-anchor="middle" font-weight="500">Type Scale</text>

  <rect x="485" y="390" width="100" height="34" rx="17" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="535" y="412" font-family="system-ui, sans-serif" font-size="13" fill="#a09d96" text-anchor="middle" font-weight="500">Spacing</text>

  <rect x="595" y="390" width="135" height="34" rx="17" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="662" y="412" font-family="system-ui, sans-serif" font-size="13" fill="#a09d96" text-anchor="middle" font-weight="500">Components</text>

  <rect x="740" y="390" width="130" height="34" rx="17" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="805" y="412" font-family="system-ui, sans-serif" font-size="13" fill="#a09d96" text-anchor="middle" font-weight="500">Dark &amp; Light</text>

  <!-- Export formats -->
  <text x="600" y="470" font-family="system-ui, sans-serif" font-size="14" fill="#5a574f" text-anchor="middle" font-weight="500" letter-spacing="2">
    EXPORT AS CSS  ·  TAILWIND  ·  JSON  ·  SCSS  ·  FIGMA
  </text>

  <!-- URL -->
  <text x="600" y="560" font-family="system-ui, sans-serif" font-size="16" fill="#7B5BFF" text-anchor="middle" font-weight="600" letter-spacing="1">
    hextodesign.com
  </text>
</svg>
