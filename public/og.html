<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; font-family: "Geist", system-ui, -apple-system, sans-serif; }
.og {
  width: 1200px; height: 630px;
  background: linear-gradient(135deg, #0a0a0c 0%, #141418 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative;
}
.glow {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -30%);
  width: 800px; height: 400px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(123,91,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.swatches {
  display: flex; gap: 8px; margin-bottom: 32px;
}
.swatch {
  width: 52px; height: 52px; border-radius: 10px;
}
.swatch.active { outline: 2px solid rgba(255,255,255,0.25); outline-offset: 2px; }
.swatch-label {
  text-align: center; font-size: 11px; color: #7B5BFF; font-weight: 600; margin-top: 6px;
}
.logo {
  font-size: 56px; font-weight: 500; color: #e8e6e1; letter-spacing: -1px; margin-bottom: 12px;
}
.logo .a { color: #7B5BFF; }
.tagline {
  font-size: 22px; color: #8a8780; margin-bottom: 36px;
}
.pills {
  display: flex; gap: 10px; margin-bottom: 28px;
}
.pill {
  padding: 8px 18px; border-radius: 17px; font-size: 13px; font-weight: 500;
  color: #a09d96; background: #1a1a1e; border: 1px solid #2a2a2e;
}
.exports {
  font-size: 14px; color: #5a574f; font-weight: 500; letter-spacing: 2px; margin-bottom: 36px;
}
.url {
  font-size: 16px; color: #7B5BFF; font-weight: 600; letter-spacing: 1px;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="og">
  <div class="glow"></div>
  <div class="swatches">
    <div class="swatch" style="background:#EFEFFF"></div>
    <div class="swatch" style="background:#C4BFFF"></div>
    <div class="swatch" style="background:#AB9FFF"></div>
    <div class="swatch" style="background:#927DFF"></div>
    <div class="swatch active" style="background:#7B5BFF">
      <div class="swatch-label">500</div>
    </div>
    <div class="swatch" style="background:#613DD6"></div>
    <div class="swatch" style="background:#4926AC"></div>
    <div class="swatch" style="background:#351782"></div>
    <div class="swatch" style="background:#210A59"></div>
  </div>
  <div class="logo"><span class="a">#</span>hex<span class="a">to</span>design</div>
  <div class="tagline">Paste a color, get a design system</div>
  <div class="pills">
    <div class="pill">OKLCH Palette</div>
    <div class="pill">Type Scale</div>
    <div class="pill">Spacing</div>
    <div class="pill">Components</div>
    <div class="pill">Dark & Light</div>
  </div>
  <div class="exports">EXPORT AS CSS &middot; TAILWIND &middot; JSON &middot; SCSS &middot; FIGMA</div>
  <div class="url">hextodesign.com</div>
</div>
</body>
</html>
