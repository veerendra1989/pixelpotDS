<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .h { stroke-linecap: round; stroke-linejoin: round; fill: none; stroke-width: 3.2; }
    @media (prefers-color-scheme: light) { .h { stroke: #1a1a1a; } }
    @media (prefers-color-scheme: dark) { .h { stroke: #f3f1ec; } }
  </style>
  <!-- # symbol as strokes matching Finlandica Headline style -->
  <line class="h" x1="11" y1="5" x2="9" y2="27"/>
  <line class="h" x1="23" y1="5" x2="21" y2="27"/>
  <line class="h" x1="5" y1="12" x2="27" y2="12"/>
  <line class="h" x1="5" y1="20" x2="27" y2="20"/>
</svg>
