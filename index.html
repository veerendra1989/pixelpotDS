<style>
/* ==========================================================
   hextodesign - homepage styles
   Dark-first, warm near-black with molten amber accent.
   ========================================================== */

:root {
  /* Brand (mutable via Tweaks) */
  --brand-h: 286;
  --brand-c: 0.23;
  --brand-l: 0.60;
  --brand: oklch(var(--brand-l) var(--brand-c) var(--brand-h));
  --brand-soft: oklch(var(--brand-l) var(--brand-c) var(--brand-h) / 0.18);
  --brand-faint: oklch(var(--brand-l) var(--brand-c) var(--brand-h) / 0.08);
  --brand-ink: oklch(0.18 0.05 var(--brand-h)); /* dark on brand */

  --accent-h: 285;
  --accent: oklch(0.70 0.16 var(--accent-h));
  --accent-soft: oklch(0.70 0.16 var(--accent-h) / 0.18);

  /* Surface scale - warm-leaning near-black */
  --bg: #08080a;
  --bg-1: #0c0c0f;
  --bg-2: #111114;
  --bg-3: #16161a;
  --bg-4: #1d1d22;

  --line: rgba(255, 255, 255, 0.07);
  --line-2: rgba(255, 255, 255, 0.12);
  --line-bright: rgba(255, 255, 255, 0.22);

  --ink: #f3f1ec;
  --ink-2: #c8c5bd;
  --ink-3: #8b877e;
  --ink-4: #5a574f;

  --pos: oklch(0.78 0.14 155);
  --neg: oklch(0.70 0.18 25);
  --info: oklch(0.74 0.13 230);

  /* Type */
  --f-sans: "Geist", ui-sans-serif, system-ui, -apple-system, "SF Pro Text", sans-serif;
  --f-serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
  --f-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;

  /* Radii */
  --r-1: 6px;
  --r-2: 10px;
  --r-3: 14px;
  --r-4: 20px;
  --r-5: 28px;

  /* Shadow */
  --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.04) inset, 0 30px 60px -30px rgba(0, 0, 0, 0.6);
  --glow: 0 0 0 1px var(--brand-soft), 0 20px 80px -20px var(--brand-soft);

  --nav-bg: rgba(8, 8, 10, 0.55);
  --float-bg: linear-gradient(180deg, rgba(28,28,32,0.85), rgba(18,18,22,0.85));
  --card-bg: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0.005));
  --grain-blend: overlay;
  --grain-opacity: 0.05;

  color-scheme: dark;
}

/* ===== LIGHT THEME ===== */
:root[data-theme="light"] {
  --bg: #faf8f3;
  --bg-1: #f4f1e9;
  --bg-2: #ece8dd;
  --bg-3: #e2ddcf;
  --bg-4: #d4ceba;

  --line: rgba(20, 18, 14, 0.08);
  --line-2: rgba(20, 18, 14, 0.14);
  --line-bright: rgba(20, 18, 14, 0.28);

  --ink: #14120e;
  --ink-2: #44403a;
  --ink-3: #78736a;
  --ink-4: #a8a294;

  --brand-l: 0.62;
  --brand-c: 0.16;
  --brand-ink: oklch(0.98 0.02 var(--brand-h));
  --brand-soft: oklch(var(--brand-l) var(--brand-c) var(--brand-h) / 0.22);
  --brand-faint: oklch(var(--brand-l) var(--brand-c) var(--brand-h) / 0.10);

  --pos: oklch(0.55 0.16 155);
  --neg: oklch(0.55 0.20 25);

  --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.6) inset, 0 20px 50px -25px rgba(40, 30, 10, 0.18);
  --nav-bg: rgba(250, 248, 243, 0.7);
  --float-bg: linear-gradient(180deg, rgba(255,253,247,0.92), rgba(244,241,233,0.92));
  --card-bg: linear-gradient(180deg, rgba(255,253,247,0.6), rgba(255,253,247,0.2));
  --grain-blend: multiply;
  --grain-opacity: 0.08;

  color-scheme: light;
}

:root[data-theme="light"] body {
  background:
    radial-gradient(1100px 700px at 50% -100px, var(--brand-faint), transparent 60%),
    radial-gradient(900px 600px at 92% 12%, oklch(0.55 0.14 285 / 0.06), transparent 70%),
    var(--bg);
}

:root[data-theme="light"] .mock__head .lights span { background: var(--bg-4); }

/* light theme: invert the floating mobile bezel from black to ink */
:root[data-theme="light"] [style*="border: 10px solid #1a1a1f"] {
  border-color: var(--ink) !important;
}
:root[data-theme="light"] [style*="background: #1a1a1f"] { background: var(--ink) !important; }

:root[data-theme="light"] .float {
  box-shadow:
    0 1px 0 rgba(255,255,255,0.6) inset,
    0 30px 80px -25px rgba(40, 30, 10, 0.18);
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-sans);
  font-feature-settings: "ss01", "cv11";
  font-synthesis: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  scroll-behavior: smooth;
}

body {
  overflow-x: hidden;
  background:
    radial-gradient(1100px 700px at 50% -100px, var(--brand-faint), transparent 60%),
    radial-gradient(900px 600px at 92% 12%, rgba(120, 100, 220, 0.06), transparent 70%),
    var(--bg);
}

button {
  font: inherit;
  color: inherit;
}

a {
  color: inherit;
  text-decoration: none;
}

/* ===== grain overlay ===== */
body.grain::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: var(--grain-opacity);
  mix-blend-mode: var(--grain-blend);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/></svg>");
}

/* ===== layout ===== */
.wrap {
  width: min(1240px, 100% - 48px);
  margin-inline: auto;
}

@media (max-width: 720px) {
  .wrap {
    width: min(1240px, 100% - 32px);
  }
}

.section {
  padding: 50px 0;
  position: relative;
}

.section--tight {
  padding: 30px 0;
}

@media (max-width: 720px) {
  .section { padding: 40px 0; }
  .section--tight { padding: 24px 0; }
}

/* ===== type utilities ===== */
.eyebrow {
  display: none;
}

.section-title {
  font-family: var(--f-sans);
  font-size: clamp(34px, 4.4vw, 56px);
  letter-spacing: -0.02em;
  line-height: 1.02;
  margin: 14px 0 16px;
  font-weight: 500;
  text-wrap: balance;
}

.section-title em {
  font-family: var(--f-serif);
  font-style: italic;
  font-weight: 400;
  color: var(--brand);
}

.section-sub {
  color: var(--ink-3);
  font-size: 17px;
  line-height: 1.55;
  max-width: 600px;
  text-wrap: pretty;
}

.section-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 32px;
  margin-bottom: 40px;
}

@media (max-width: 720px) {
  .section-head { flex-direction: column; align-items: flex-start; margin-bottom: 28px; }
}

/* ===== buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 18px;
  border-radius: 10px;
  border: 1px solid transparent;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
  cursor: pointer;
  transition: transform 120ms ease, background 200ms, border-color 200ms, color 200ms, box-shadow 200ms;
  white-space: nowrap;
}

.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }

.btn--primary {
  background: var(--brand);
  color: var(--brand-ink);
  box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06) inset, 0 10px 30px -8px var(--brand-soft);
  font-weight: 600;
}
.btn--primary:hover {
  filter: brightness(1.05);
  box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.15) inset, 0 14px 40px -8px var(--brand-soft);
}

.btn--ghost {
  background: transparent;
  color: var(--ink);
  border-color: var(--line-2);
}
.btn--ghost:hover {
  background: rgba(255, 255, 255, 0.04);
  border-color: var(--line-bright);
}

.btn--small {
  padding: 8px 12px;
  font-size: 13px;
  border-radius: 8px;
}

.btn .arr { transition: transform 200ms; }
.btn:hover .arr { transform: translateX(2px); }

/* ===== cards ===== */
.card {
  background: var(--card-bg);
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  position: relative;
}

.card--hover {
  transition: border-color 200ms, transform 200ms, box-shadow 200ms;
}
.card--hover:hover {
  border-color: var(--line-2);
  transform: translateY(-2px);
}

.glow-ring {
  position: relative;
}
.glow-ring::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(180deg, var(--brand-soft), transparent 60%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

/* ===== nav ===== */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  background: var(--nav-bg);
  border-bottom: 1px solid var(--line);
}
.nav__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}
.nav__brand {
  display: flex;
  align-items: center;
  gap: 0;
  font-family: "Finlandica Headline", sans-serif;
  font-weight: 500;
  font-size: 28px;
  letter-spacing: -0.01em;
  color: var(--ink);
  text-decoration: none;
}
.nav__brand .brand-accent { color: var(--brand); }
.nav__menu {
  display: flex;
  gap: 4px;
}
.nav__menu a {
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 14px;
  color: var(--ink-2);
  transition: color 150ms, background 150ms;
}
.nav__menu a:hover { color: var(--ink); background: rgba(255,255,255,0.04); }
.nav__cta {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav__pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 24px;
  padding: 0 8px;
  border-radius: 999px;
  border: 1px solid var(--line);
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--ink-3);
  text-transform: uppercase;
}
@media (max-width: 860px) {
  .nav__menu { display: none; }
}

/* theme toggle */
/* ── Floating Theme Toggle ── */
.theme-toggle-float {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid var(--line-2);
  background: var(--bg-1);
  box-shadow: 0 4px 24px rgba(0,0,0,0.18), 0 0 0 1px var(--line);
  cursor: pointer;
  transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.theme-toggle-float:hover {
  box-shadow: 0 6px 32px rgba(0,0,0,0.24), 0 0 0 1px var(--brand);
  border-color: var(--brand);
  transform: translateY(-2px);
}
.theme-toggle-float__icon {
  width: 20px; height: 20px;
  color: var(--ink);
  display: grid; place-items: center;
  transition: color 0.2s;
}
.theme-toggle-float__label {
  font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
  color: var(--ink-2);
  text-transform: uppercase;
  font-family: var(--f-mono);
  user-select: none;
}
/* old nav toggle — hide */
.theme-toggle { display: none; }
.theme-toggle__track { display: none; }

/* ===== hero ===== */
.hero {
  position: relative;
  padding: 0;
  overflow: hidden;
  height: calc(100vh - 64px);
  min-height: 600px;
  display: flex;
  align-items: center;
}

/* Mouse trail canvas */
.hero__canvas {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

.hero__bg {
  position: absolute;
  inset: -10% -10% 0;
  z-index: 0;
  pointer-events: none;
}
.hero__bg svg { width: 100%; height: 100%; }

.hero__grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 80%);
  pointer-events: none;
  opacity: 0.6;
}

/* Corner crosses on grid */
.hero__cross {
  position: absolute;
  width: 24px; height: 24px;
  z-index: 1;
  color: var(--ink-4);
  opacity: 0.4;
}
.hero__cross--tl { top: 20%; left: 15%; }
.hero__cross--tr { top: 15%; right: 20%; }
.hero__cross--bl { bottom: 25%; left: 25%; }
.hero__cross--br { bottom: 20%; right: 15%; }

/* Typewriter cursor */
.tw-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--brand);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
@keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }

/* Shine border on hex input */
@keyframes shine-rotate {
  0% { --shine-angle: 0deg; }
  100% { --shine-angle: 360deg; }
}
@property --shine-angle {
  syntax: "<angle>";
  initial-value: 0deg;
  inherits: false;
}
.hex-input {
  margin-top: 24px;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px 10px 10px;
  border: 2px solid transparent;
  border-radius: 999px;
  background:
    linear-gradient(var(--bg-1), var(--bg-1)) padding-box,
    conic-gradient(from var(--shine-angle), var(--brand), var(--line-bright), var(--brand), var(--line-bright), var(--brand)) border-box;
  animation: shine-rotate 4s linear infinite;
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 0 0 1px var(--line);
  transition: box-shadow 0.3s;
}
.hex-input:focus-within {
  box-shadow: 0 4px 32px var(--brand-soft), 0 0 0 1px var(--brand);
}

.hero__inner {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
  gap: 48px;
  align-items: center;
  padding: 20px 0 24px;
}
@media (max-width: 980px) {
  .hero__inner { grid-template-columns: 1fr; gap: 32px; padding: 20px 0 40px; }
  .hero { height: auto; min-height: auto; padding: 24px 0 40px; }
}

.hero__title {
  font-size: clamp(32px, 4vw, 52px);
  line-height: 1.02;
  letter-spacing: -0.035em;
  font-weight: 500;
  margin: 14px 0 16px;
  text-wrap: balance;
  overflow-wrap: break-word;
  word-break: break-word;
}
.hero__title em {
  font-family: var(--f-serif);
  font-style: italic;
  font-weight: 400;
  background: linear-gradient(180deg, var(--brand) 0%, oklch(0.65 0.14 var(--brand-h)) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
}
.hero__sub {
  color: var(--ink-2);
  font-size: 17px;
  line-height: 1.45;
  max-width: 520px;
  text-wrap: pretty;
}
.hero__ctas {
  display: flex;
  gap: 12px;
  margin-top: 22px;
  flex-wrap: wrap;
}
.hero-cta-mobile { display: none; }
.hero-cta-desktop { display: inline; }
.hero__meta {
  margin-top: 18px;
  display: flex;
  gap: 12px 22px;
  flex-wrap: wrap;
  align-items: center;
  color: var(--ink-3);
  font-size: 13px;
  font-family: var(--f-mono);
  max-width: 100%;
}
.hero__meta .sep { width: 4px; height: 4px; border-radius: 50%; background: var(--ink-4); }
.check {
  display: inline-flex; align-items: center; gap: 6px;
}

/* hex pill continued */
.hex-input__swatch {
  width: 48px;
  height: 48px;
  border-radius: 999px;
  background: var(--brand);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.15) inset, 0 0 32px var(--brand-soft);
  flex: none;
  cursor: pointer;
  transition: box-shadow 0.3s, transform 0.2s;
}
.hex-input__swatch:hover {
  transform: scale(1.06);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.2) inset, 0 0 48px var(--brand-soft);
}
.hex-input input {
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--f-mono);
  font-size: 18px;
  letter-spacing: 0.04em;
  color: var(--ink);
  width: 130px;
  text-transform: uppercase;
  padding: 0 16px;
}
.hex-input button {
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 999px;
  height: 44px;
  padding: 0 28px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 120ms, transform 120ms;
}
.hex-input button:hover { background: var(--brand); color: var(--brand-ink); transform: scale(1.02); }

/* ── Color Preview Strip (hidden) ── */
.hex-preview-strip { display: none; }

.hex-suggestions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.hex-suggestions .label {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-4);
  margin-right: 6px;
}
.hex-suggestions button {
  width: 32px; height: 32px;
  border-radius: 10px;
  border: 2px solid var(--line);
  cursor: pointer;
  padding: 0;
  transition: transform 150ms, border-color 150ms, box-shadow 150ms;
}
.hex-suggestions button:hover { transform: scale(1.12); border-color: var(--line-bright); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

/* hero stage - floating panels */
.hero__stage {
  position: relative;
  height: min(520px, calc(100vh - 200px));
}
@media (max-width: 980px) {
  .hero__stage { height: 420px; }
}
.float {
  position: absolute;
  border-radius: var(--r-3);
  border: 1px solid var(--line-2);
  background: var(--float-bg);
  backdrop-filter: blur(20px);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.05) inset,
    0 30px 80px -20px rgba(0,0,0,0.7);
  animation: floatY 8s ease-in-out infinite;
}
.float--1 { animation-duration: 9s; }
.float--2 { animation-duration: 11s; animation-delay: -2s; }
.float--3 { animation-duration: 7.5s; animation-delay: -4s; }
.float--4 { animation-duration: 10s; animation-delay: -1s; }

@keyframes floatY {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* ===== marquee ===== */
.marquee {
  position: relative;
  padding: 36px 0;
  border-block: 1px solid var(--line);
  overflow: hidden;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.015));
}
.marquee::before, .marquee::after {
  content: "";
  position: absolute;
  top: 0; bottom: 0;
  width: 120px;
  z-index: 2;
  pointer-events: none;
}
.marquee::before { left: 0; background: linear-gradient(90deg, var(--bg), transparent); }
.marquee::after { right: 0; background: linear-gradient(-90deg, var(--bg), transparent); }
.marquee__track {
  display: flex;
  gap: 64px;
  animation: scroll 40s linear infinite;
  width: max-content;
}
.marquee__item {
  font-family: var(--f-serif);
  font-size: 22px;
  color: var(--ink-3);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 64px;
  white-space: nowrap;
}
.marquee__item .b {
  color: var(--ink);
  font-family: var(--f-sans);
  font-size: 18px;
  font-weight: 500;
  font-style: normal;
  letter-spacing: -0.01em;
}
@keyframes scroll {
  to { transform: translateX(-50%); }
}

/* ===== template gallery ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
@media (max-width: 1100px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 800px) { .gallery { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 520px) { .gallery { grid-template-columns: 1fr; } }

.tpl {
  position: relative;
  border-radius: var(--r-3);
  border: 1px solid var(--line);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 200ms, transform 200ms;
  background: var(--bg-1);
}
.tpl:hover { border-color: var(--line-2); transform: translateY(-3px); }
.tpl__art {
  aspect-ratio: 4/3;
  border-bottom: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}
.tpl__meta {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.tpl__name {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.tpl__tags {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-top: 2px;
}
.tpl__price {
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--ink-2);
}
.tpl__free {
  color: var(--brand);
  font-weight: 500;
}

/* ===== bento ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 180px;
  gap: 14px;
}
@media (max-width: 980px) {
  .bento { grid-template-columns: repeat(2, 1fr); grid-auto-rows: auto; }
  .bento > * { grid-column: span 1 !important; grid-row: auto !important; }
  .bento__big { grid-column: span 2 !important; }
  .bento__cell { min-height: 180px; }
}
@media (max-width: 520px) {
  .bento { grid-template-columns: 1fr; }
  .bento__big { grid-column: span 1 !important; }
  .bento__cell { min-height: 160px; }
}
.bento__cell {
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  background: var(--bg-1);
  padding: 22px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.bento__cell:hover { border-color: var(--line-2); }
.bento__label {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.bento__title {
  font-size: 18px;
  letter-spacing: -0.01em;
  font-weight: 500;
  margin-top: 6px;
}
.bento__desc {
  font-size: 13px;
  color: var(--ink-3);
  line-height: 1.5;
  margin-top: 6px;
  max-width: 320px;
}

/* ===== pricing ===== */
.pricing {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  align-items: start;
}
@media (max-width: 1080px) { .pricing { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .pricing { grid-template-columns: 1fr; } }

.price {
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  padding: 28px;
  background: var(--bg-1);
  position: relative;
  display: flex;
  flex-direction: column;
}
.price--feature {
  border-color: var(--brand-soft);
  background:
    radial-gradient(600px 200px at 50% 0%, var(--brand-faint), transparent 60%),
    var(--bg-2);
  box-shadow: 0 0 0 1px var(--brand-soft), 0 30px 80px -30px var(--brand-soft);
}
.price__name {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.price__amount {
  font-size: 48px;
  letter-spacing: -0.04em;
  font-weight: 500;
  margin: 12px 0 6px;
  line-height: 1;
}
.price__amount sup { font-size: 16px; vertical-align: top; color: var(--ink-3); margin-right: 4px; }
.price__amount sub { font-size: 14px; color: var(--ink-3); font-weight: 400; }
.price__tag {
  font-size: 13px;
  color: var(--ink-3);
  margin-bottom: 24px;
  min-height: 36px;
}
.price__list {
  list-style: none;
  padding: 0; margin: 0 0 28px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-size: 13px;
  color: var(--ink-2);
}
.price__list li {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  line-height: 1.4;
}
.price__list li .ico {
  color: var(--brand);
  flex: none;
  margin-top: 1px;
}
.price__list li .ico--dim { color: var(--ink-4); }
.price__cta { margin-top: auto; }
.price__badge {
  position: absolute;
  top: -10px;
  left: 28px;
  height: 22px;
  padding: 0 10px;
  border-radius: 999px;
  background: var(--brand);
  color: var(--brand-ink);
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  font-weight: 600;
}

/* ===== faq ===== */
.faq {
  max-width: 820px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}
.faq__row {
  border-top: 1px solid var(--line);
  padding: 24px 0;
  cursor: pointer;
}
.faq__row:last-child { border-bottom: 1px solid var(--line); }
.faq__q {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 24px;
}
.faq__q h3 {
  margin: 0;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.faq__icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--line-2);
  display: grid; place-items: center;
  flex: none;
  transition: transform 200ms, border-color 200ms, background 200ms;
  color: var(--ink-2);
}
.faq__row[data-open="true"] .faq__icon {
  background: var(--brand);
  color: var(--brand-ink);
  border-color: transparent;
  transform: rotate(45deg);
}
.faq__a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 300ms ease, margin 300ms;
  color: var(--ink-3);
  font-size: 15px;
  line-height: 1.55;
}
.faq__row[data-open="true"] .faq__a {
  max-height: 240px;
  margin-top: 14px;
}

/* ===== footer ===== */
.footer {
  border-top: 1px solid var(--line);
  padding: 80px 0 40px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.footer__inner {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr 1.2fr;
  gap: 48px;
}
@media (max-width: 880px) {
  .footer__inner { grid-template-columns: 1fr 1fr; gap: 32px; }
}
.footer h4 {
  margin: 0 0 16px;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: var(--f-mono);
  color: var(--ink-3);
  font-weight: 500;
}
.footer ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.footer ul a {
  color: var(--ink-2);
  font-size: 14px;
  transition: color 150ms;
}
.footer ul a:hover { color: var(--ink); }
.footer__bottom {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  color: var(--ink-3);
  font-size: 12px;
  font-family: var(--f-mono);
}
.footer__giant {
  margin-top: 80px;
  font-size: clamp(80px, 18vw, 240px);
  font-family: var(--f-serif);
  font-style: italic;
  letter-spacing: -0.04em;
  line-height: 0.9;
  background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 80%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  user-select: none;
  pointer-events: none;
}

/* ===== shared mock components used in playground/cards ===== */
.mini-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid transparent;
}
.mini-btn--primary { background: var(--brand); color: var(--brand-ink); }
.mini-btn--ghost { background: transparent; color: var(--ink); border-color: var(--line-2); }
.mini-btn--soft { background: var(--brand-soft); color: var(--brand); }

.mini-input {
  height: 36px;
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-radius: 8px;
  padding: 0 12px;
  color: var(--ink);
  font-family: var(--f-sans);
  font-size: 13px;
  width: 100%;
  outline: none;
  transition: border-color 150ms, box-shadow 150ms;
}
.mini-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px var(--brand-soft);
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 22px;
  padding: 0 8px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-radius: 999px;
  border: 1px solid var(--line-2);
  color: var(--ink-2);
}
.chip--brand { background: var(--brand-soft); color: var(--brand); border-color: transparent; }
.chip--pos { background: oklch(0.78 0.14 155 / 0.16); color: var(--pos); border-color: transparent; }
.chip--neg { background: oklch(0.70 0.18 25 / 0.16); color: var(--neg); border-color: transparent; }

.token-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--ink-2);
}
.token-row .sw {
  width: 14px; height: 14px; border-radius: 4px; flex: none;
  border: 1px solid rgba(255,255,255,0.1);
}

/* ===== playground ===== */
.pg {
  border: 1px solid var(--line);
  border-radius: var(--r-4);
  background:
    radial-gradient(700px 300px at 80% 0%, var(--brand-faint), transparent 70%),
    var(--bg-1);
  overflow: hidden;
}
.pg-generate {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 48px 24px 16px;
  text-align: center;
}
.pg-generate__label {
  margin: 0;
  font-size: 15px;
  color: var(--ink-3);
}
.pg-generate__btn {
  font-size: 16px;
  padding: 14px 32px;
  border-radius: var(--r-3);
}

.pg__bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  gap: 16px;
}
.pg__tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-2);
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--line);
}
.pg__tabs button {
  background: transparent;
  border: none;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 7px;
  color: var(--ink-3);
  cursor: pointer;
  transition: background 150ms, color 150ms;
  font-family: var(--f-mono);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.pg__tabs button:hover { color: var(--ink-2); }
.pg__tabs button[data-active="true"] {
  background: var(--brand);
  color: var(--brand-ink);
  box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 4px 12px -4px var(--brand-soft);
}
.pg__color {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--ink-2);
  border: 1px solid var(--line-2);
  border-radius: 999px;
  padding: 4px 4px 4px 12px;
}
.pg__color .sw {
  width: 22px; height: 22px;
  border-radius: 999px;
  background: var(--brand);
  border: 1px solid rgba(255,255,255,0.15);
  flex: none;
}
.pg__hue {
  width: 240px;
  height: 10px;
  background: linear-gradient(90deg, oklch(0.78 0.17 0), oklch(0.78 0.17 30), oklch(0.78 0.17 60), oklch(0.78 0.17 90), oklch(0.78 0.17 120), oklch(0.78 0.17 150), oklch(0.78 0.17 180), oklch(0.78 0.17 210), oklch(0.78 0.17 240), oklch(0.78 0.17 270), oklch(0.78 0.17 300), oklch(0.78 0.17 330), oklch(0.78 0.17 360));
  border-radius: 999px;
  position: relative;
  cursor: pointer;
  touch-action: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2) inset;
}
.pg__hue::after {
  content: "";
  position: absolute;
  top: 50%;
  left: calc((var(--brand-h) / 360) * 100%);
  transform: translate(-50%, -50%);
  width: 22px; height: 22px;
  border-radius: 50%;
  background: oklch(var(--brand-l) var(--brand-c) var(--brand-h));
  box-shadow: 0 0 0 3px var(--bg-1), 0 0 0 4.5px var(--ink), 0 0 20px var(--brand-soft), 0 0 40px var(--brand-faint);
  transition: width 150ms, height 150ms, box-shadow 150ms;
  will-change: left;
}
.pg__hue:active::after, .pg__hue.dragging::after {
  width: 26px; height: 26px;
  box-shadow: 0 0 0 3px var(--bg-1), 0 0 0 4.5px var(--brand), 0 0 28px var(--brand-soft), 0 0 56px var(--brand-faint);
}
.pg__body {
  display: grid;
  grid-template-columns: 280px 1fr 280px;
  min-height: 460px;
}
@media (max-width: 980px) {
  .pg__body { grid-template-columns: 1fr; }
  .pg__sidebar { display: none; }
}
.pg__sidebar {
  border-right: 1px solid var(--line);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.pg__sidebar--right {
  border-right: none;
  border-left: 1px solid var(--line);
}
.pg__group h4 {
  margin: 0 0 10px;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.pg__canvas {
  padding: 28px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  align-content: start;
}

/* mockup chrome */
.mock {
  border: 1px solid var(--line);
  border-radius: var(--r-2);
  background: var(--bg-2);
  overflow: hidden;
}
.mock__head {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-3);
}
.mock__head .lights {
  display: flex; gap: 5px;
}
.mock__head .lights span {
  width: 9px; height: 9px; border-radius: 50%; background: var(--bg-4);
}
.mock__head .url {
  flex: 1;
  text-align: center;
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--ink-3);
}
.mock__body { padding: 14px; }

/* ===== utility ===== */
.row { display: flex; gap: 8px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 8px; }
.muted { color: var(--ink-3); }
.brand { color: var(--brand); }

/* ===== reveal animations ===== */
[data-reveal] {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 700ms ease, transform 700ms ease;
}
[data-reveal="visible"] {
  opacity: 1;
  transform: translateY(0);
}

/* ===== generator workflow ===== */
.flow {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 0;
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  overflow: hidden;
  background: var(--bg-1);
}
@media (max-width: 1000px) { .flow { grid-template-columns: 1fr 1fr; } }
@media (max-width: 600px) { .flow { grid-template-columns: 1fr; } }
.flow__step {
  padding: 24px 22px 26px;
  border-right: 1px solid var(--line);
  position: relative;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.flow__step:last-child { border-right: none; }
@media (max-width: 1000px) {
  .flow__step:nth-child(2n) { border-right: none; }
  .flow__step { border-bottom: 1px solid var(--line); }
}
.flow__num {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink-3);
}
.flow__title {
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.flow__desc {
  font-size: 13px;
  color: var(--ink-3);
  line-height: 1.5;
}
.flow__viz {
  margin-top: auto;
  height: 110px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

/* ===== mockup showcase ===== */
.showcase {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 16px;
  height: 720px;
}
@media (max-width: 980px) {
  .showcase { grid-template-columns: 1fr; height: auto; grid-template-rows: none; }
  .showcase > * { aspect-ratio: 16/10; }
}
.showcase__cell {
  border: 1px solid var(--line);
  border-radius: var(--r-3);
  background: var(--bg-1);
  overflow: hidden;
  position: relative;
}
.showcase__cell:nth-child(1) { grid-row: span 2; }
.showcase__label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
  z-index: 2;
  padding: 14px 16px;
  background: linear-gradient(0deg, var(--bg-1) 60%, transparent 100%);
}
.showcase__label .kind {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.showcase__label .name {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

/* utility: small dot */
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-4); }

/* sparkline */
.spark {
  height: 38px;
  width: 100%;
  display: block;
}

/* live recoloring transition */
.themed { transition: background 600ms ease, color 600ms ease, border-color 600ms ease; }

/* ===== generate wizard modal ===== */
.wiz-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s cubic-bezier(0.16,1,0.3,1);
}
.wiz-overlay.open { opacity: 1; pointer-events: all; }
.wiz-panel {
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: 24px;
  width: 100%; max-width: 520px;
  padding: 48px 44px;
  position: relative;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  box-shadow: 0 40px 120px rgba(0,0,0,0.25);
}
.wiz-overlay.open .wiz-panel { transform: translateY(0) scale(1); }
.wiz-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--line); background: var(--bg);
  display: grid; place-items: center; cursor: pointer;
  color: var(--ink-3); font-size: 18px;
  transition: border-color 0.2s, color 0.2s;
}
.wiz-close:hover { border-color: var(--ink-3); color: var(--ink); }
.wiz-title {
  font-size: 24px; font-weight: 600; letter-spacing: -0.02em;
  margin-bottom: 6px;
}
.wiz-sub { font-size: 14px; color: var(--ink-3); line-height: 1.5; margin-bottom: 32px; }
.wiz-field { margin-bottom: 24px; }
.wiz-label {
  display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px;
  font-family: var(--f-mono);
}
.wiz-input {
  width: 100%; padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--line); background: var(--bg);
  font-size: 15px; color: var(--ink); font-family: var(--f-sans);
  outline: none; transition: border-color 0.2s;
}
.wiz-input:focus { border-color: var(--brand); }
.wiz-input::placeholder { color: var(--ink-4); }
.wiz-color-row {
  display: flex; align-items: center; gap: 12px;
}
.wiz-color-preview {
  width: 48px; height: 48px; border-radius: 12px;
  border: 2px solid var(--line); flex-shrink: 0;
  position: relative; overflow: hidden; cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.wiz-color-preview:hover {
  border-color: var(--brand);
  box-shadow: 0 0 24px var(--brand-soft);
}
.wiz-color-native {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer; border: none;
}
.wiz-select {
  width: 100%; padding: 14px 16px; border-radius: 12px;
  border: 1.5px solid var(--line); background: var(--bg);
  font-size: 15px; color: var(--ink); font-family: var(--f-sans);
  outline: none; cursor: pointer;
  -webkit-appearance: none; appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23999' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 16px center;
  padding-right: 40px;
  transition: border-color 0.2s;
}
.wiz-select:focus { border-color: var(--brand); }
.wiz-upload {
  border: 2px dashed var(--line); border-radius: 14px;
  padding: 28px 20px; text-align: center; cursor: pointer;
  transition: border-color 0.25s, background 0.25s;
  position: relative; overflow: hidden;
}
.wiz-upload:hover { border-color: var(--brand); background: var(--brand-faint); }
.wiz-upload-icon { font-size: 24px; margin-bottom: 6px; color: var(--ink-3); }
.wiz-upload-text { font-size: 13px; color: var(--ink-3); }
.wiz-upload-text strong { color: var(--brand); }
.wiz-upload input[type="file"] {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer;
}
.wiz-upload-preview {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-radius: 12px;
  border: 1.5px solid var(--line); background: var(--bg);
}
.wiz-upload-preview img { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; background: var(--bg-1); }
.wiz-upload-preview .name { font-size: 13px; color: var(--ink); flex: 1; }
.wiz-upload-preview .remove {
  font-size: 11px; color: var(--ink-3); cursor: pointer;
  padding: 4px 10px; border-radius: 6px; border: 1px solid var(--line);
  background: var(--bg); transition: color 0.2s, border-color 0.2s;
}
.wiz-upload-preview .remove:hover { color: var(--neg); border-color: var(--neg); }
.wiz-generate {
  width: 100%; padding: 16px 0; border-radius: 14px; border: none;
  background: var(--brand); color: var(--brand-ink);
  font-size: 16px; font-weight: 600; font-family: var(--f-sans);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: transform 0.2s, box-shadow 0.2s;
  margin-top: 8px;
}
.wiz-generate:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px var(--brand-soft);
}
.wiz-note { font-size: 12px; color: var(--ink-4); text-align: center; margin-top: 14px; }
@media (max-width: 600px) {
  .wiz-panel { padding: 32px 24px; }
}

/* ===== TABLET RESPONSIVE — 768px ===== */
@media (max-width: 768px) {
  /* Hero stage: smaller floating cards */
  .hero__stage { height: 360px; }
  .float { transform: scale(0.85); }

  /* Playground canvas: single column */
  .pg__canvas { grid-template-columns: 1fr; }
  .pg__hue { width: 180px; }

  /* Section spacing tighter */
  .section-head { margin-bottom: 32px; }
}

/* ===== Ensure hero doesn't clip on mid-sized phones ===== */
@media (max-width: 980px) and (max-height: 700px) {
  .hero {
    height: auto;
    min-height: auto;
    padding: 24px 0 32px;
  }
  .hero__stage { height: 280px; }
}

/* ===== MOBILE — 480px and below ===== */
@media (max-width: 480px) {

  /* ── Global: 20px side padding ── */
  .wrap { width: calc(100% - 40px); }

  /* ── Nav ── */
  .nav__inner { height: 64px; }
  .nav__brand { font-size: 22px; }
  .nav__cta .btn { padding: 8px 14px; font-size: 13px; }

  /* ── Hero CTA label swap ── */
  .hero-cta-desktop { display: none; }
  .hero-cta-mobile { display: inline; }

  /* ── Hero: clean centered layout, NO background animation ── */
  .hero {
    height: auto;
    min-height: auto;
    padding: 80px 0 32px;
  }
  .hero__inner {
    text-align: center;
    gap: 0;
  }
  /* Hide floating cards, canvas animation, BG, crosses — keep grid pattern */
  .hero__stage,
  .hero__canvas,
  .hero__bg,
  .hero__cross { display: none !important; }
  .hero__grid {
    opacity: 0.3;
    background-size: 40px 40px;
  }

  .hero__title {
    font-size: 34px;
    margin: 0 0 16px;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }
  .hero__sub {
    font-size: 16px;
    line-height: 1.55;
    margin-inline: auto;
    color: var(--ink-2);
    min-height: 3.1em;
  }

  /* Hex input: centered, bigger pill, faster glow */
  .hex-input {
    padding: 8px;
    margin-top: 24px;
    align-self: center;
    animation-duration: 1.5s;
  }
  .hex-input__swatch { width: 40px; height: 40px; }
  .hex-input input { font-size: 16px; width: 100px; padding: 0 8px; height: 40px; }
  .hex-input button { display: none; }
  .hex-preview-strip { display: none; }
  .hex-suggestions { justify-content: center; margin-top: 16px; }

  /* CTAs: full-width, bold, stacked */
  .hero__ctas {
    flex-direction: column;
    gap: 10px;
    width: 100%;
    margin-top: 24px;
  }
  .hero__ctas .btn {
    justify-content: center;
    width: 100%;
    padding: 16px 18px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
  }
  .hero__meta {
    font-size: 12px;
    gap: 8px 16px;
    justify-content: center;
    margin-top: 18px;
    color: var(--ink-2);
  }

  /* ── Section titles ── */
  .section-title { font-size: clamp(26px, 7.5vw, 34px); }
  .section-sub { font-size: 15px; line-height: 1.55; color: var(--ink-2); }
  .section-head { margin-bottom: 24px; }

  /* ── Playground: compact card ── */
  .pg { border-radius: var(--r-2); }
  .pg-generate { padding: 28px 16px 12px; }
  .pg-generate__label { font-size: 13px; }
  .pg__bar {
    flex-direction: column;
    padding: 20px 16px 24px;
    gap: 14px;
    align-items: stretch;
  }
  .pg__tabs { display: none; }
  .pg__bar > div { width: 100%; flex-direction: column; gap: 14px; }
  .pg__hue { width: 100% !important; height: 12px; }
  .pg__color {
    align-self: flex-start;
    font-size: 12px;
    padding: 6px 14px 6px 6px;
  }

  /* Hide "Generate my design system" CTA inside playground on mobile */
  .pg-generate { display: none; }
  .pg__canvas { grid-template-columns: 1fr; padding: 14px; gap: 10px; }

  /* Hide subscription, dashboard, reviewer cards on mobile playground */
  .pg__canvas .card { display: none !important; }
  .pg__sidebar { display: block !important; }
  .pg__sidebar--right { display: none !important; }

  /* ── Bento / Deliverables: compact list ── */
  .bento { grid-template-columns: 1fr; grid-auto-rows: auto; gap: 8px; }
  .bento > * { grid-column: span 1 !important; grid-row: auto !important; }
  .bento__cell {
    min-height: auto;
    padding: 16px;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }
  .bento__big { grid-column: span 1 !important; }
  .bento__big .bento__title { font-size: 20px; }
  .bento__title { font-size: 16px; margin-top: 0; }
  .bento__desc { display: none; }
  .bento__label { font-size: 9px; }

  /* tokens.json card: stack text on top, inner grid below */
  .bento__big > div:last-child {
    grid-template-columns: 1fr !important;
    width: 100%;
  }
  .bento__big > div:last-child > pre {
    max-width: 100%;
    overflow-x: auto;
  }

  /* ── Flow / Generator steps ── */
  .flow__step { min-height: auto; padding: 16px; gap: 10px; }
  .flow__title { font-size: 16px; }
  .flow__desc { font-size: 13px; line-height: 1.5; color: var(--ink-2); }
  .flow__viz { height: 72px; }

  /* ── Showcase ── */
  .showcase > * { aspect-ratio: 3/2; }

  /* ── Pricing ── */
  .price { padding: 20px; }
  .price__amount { font-size: 40px; }
  .price__tag { font-size: 13px; min-height: auto; margin-bottom: 18px; color: var(--ink-2); }
  .price__list { font-size: 14px; gap: 10px; margin-bottom: 20px; }

  /* ── FAQ ── */
  .faq__q h3 { font-size: 16px; }
  .faq__a { font-size: 14px; line-height: 1.55; color: var(--ink-2); }
  .faq__row { padding: 18px 0; }

  /* ── Footer: clean 2-col mobile ── */
  .footer { padding: 36px 0 20px; }
  .footer__inner {
    grid-template-columns: 1fr 1fr;
    gap: 24px 16px;
  }
  .footer__inner > *:first-child {
    grid-column: 1 / -1;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
  }
  .footer h4 { font-size: 11px; margin-bottom: 10px; }
  .footer ul { gap: 8px; }
  .footer ul a { font-size: 14px; }
  .footer__inner > *:last-child {
    grid-column: 1 / -1;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }
  .footer__giant { display: none; }
  .footer__bottom {
    margin-top: 24px;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    font-size: 11px;
  }
}

/* ===== 375px and below (small phones) ===== */
@media (max-width: 375px) {
  .wrap { width: calc(100% - 40px); }
  .hero__title { font-size: 27px; }
  .nav__brand { font-size: 20px; }
  .hex-input input { width: 80px; font-size: 14px; }
  .hex-input button { padding: 0 14px; font-size: 13px; }
  .hex-suggestions button { width: 28px; height: 28px; border-radius: 8px; }
  .hex-suggestions .label { font-size: 10px; margin-right: 2px; }
}

// ===== Canvas mouse-trail animation =====
window.initHeroCanvas = function(canvasId) {
  var canvas = document.getElementById(canvasId);
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  var running = true;
  var lines = [];
  var pos = { x: 0, y: 0 };
  var cfg = { trails: 40, size: 30, friction: 0.5, dampening: 0.025, tension: 0.99 };

  function Node() { this.x = 0; this.y = 0; this.vx = 0; this.vy = 0; }

  function Trail(spring) {
    this.spring = spring;
    this.friction = cfg.friction + 0.01 * Math.random() - 0.005;
    this.nodes = [];
    for (var i = 0; i < cfg.size; i++) { var nd = new Node(); nd.x = pos.x; nd.y = pos.y; this.nodes.push(nd); }
  }
  Trail.prototype.update = function() {
    var s = this.spring, t = this.nodes[0];
    t.vx += (pos.x - t.x) * s; t.vy += (pos.y - t.y) * s;
    for (var i = 0; i < this.nodes.length; i++) {
      t = this.nodes[i];
      if (i > 0) { var p = this.nodes[i-1]; t.vx += (p.x - t.x) * s; t.vy += (p.y - t.y) * s; t.vx += p.vx * cfg.dampening; t.vy += p.vy * cfg.dampening; }
      t.vx *= this.friction; t.vy *= this.friction; t.x += t.vx; t.y += t.vy; s *= cfg.tension;
    }
  };
  Trail.prototype.draw = function() {
    var n0 = this.nodes[0]; ctx.beginPath(); ctx.moveTo(n0.x, n0.y);
    for (var i = 1; i < this.nodes.length - 2; i++) {
      var a = this.nodes[i], b = this.nodes[i+1];
      ctx.quadraticCurveTo(a.x, a.y, 0.5*(a.x+b.x), 0.5*(a.y+b.y));
    }
    var e = this.nodes[this.nodes.length-2], f = this.nodes[this.nodes.length-1];
    ctx.quadraticCurveTo(e.x, e.y, f.x, f.y); ctx.stroke(); ctx.closePath();
  };

  var hue = 0;
  function render() {
    if (!running) return;
    ctx.globalCompositeOperation = "source-over";
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = "lighter";
    // Use brand hue from CSS property
    var brandH = getComputedStyle(document.documentElement).getPropertyValue("--brand-h").trim() || "40";
    ctx.strokeStyle = "hsla(" + brandH + ",80%,55%,0.03)";
    ctx.lineWidth = 8;
    for (var i = 0; i < lines.length; i++) { lines[i].update(); lines[i].draw(); }
    hue++;
    requestAnimationFrame(render);
  }

  function resize() { canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight; }

  var started = false;
  function onMove(e) {
    var rect = canvas.getBoundingClientRect();
    var cx = (e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0));
    var cy = (e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0));
    pos.x = cx - rect.left; pos.y = cy - rect.top;
    if (!started) {
      started = true;
      lines = [];
      for (var i = 0; i < cfg.trails; i++) lines.push(new Trail(0.45 + (i / cfg.trails) * 0.025));
      render();
    }
  }

  canvas.parentElement.addEventListener("mousemove", onMove, { passive: true });
  canvas.parentElement.addEventListener("touchmove", function(e) { onMove(e); }, { passive: true });
  window.addEventListener("resize", resize);
  window.addEventListener("focus", function() { if (!running) { running = true; render(); } });
  resize();

  return function cleanup() { running = false; };
};

// ===== Typewriter =====
window.TypewriterEffect = function(el, strings, opts) {
  opts = opts || {};
  var typeSpeed = opts.typeSpeed || 80;
  var deleteSpeed = opts.deleteSpeed || 40;
  var pause = opts.pause || 2000;
  var idx = 0, charIdx = 0, deleting = false, timer;

  function tick() {
    var current = strings[idx];
    if (!deleting) {
      charIdx++;
      el.textContent = current.substring(0, charIdx);
      if (charIdx === current.length) { timer = setTimeout(function() { deleting = true; tick(); }, pause); return; }
    } else {
      charIdx--;
      el.textContent = current.substring(0, charIdx);
      if (charIdx === 0) { deleting = false; idx = (idx + 1) % strings.length; }
    }
    timer = setTimeout(tick, deleting ? deleteSpeed : typeSpeed);
  }
  tick();
  return function() { clearTimeout(timer); };
};
