<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5"/>
  <title>hextodesign — Your Design System</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Finlandica+Headline&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script>
    (function() {
      try { var t = localStorage.getItem("pp-theme") || "dark"; document.documentElement.setAttribute("data-theme", t); } catch(e) { document.documentElement.setAttribute("data-theme", "dark"); }
    })();
  </script>
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════ */
:root {
  --brand-h: 65; --brand-c: 0.17; --brand-l: 0.78;
  --brand: oklch(var(--brand-l) var(--brand-c) var(--brand-h));
  --brand-soft: oklch(var(--brand-l) var(--brand-c) var(--brand-h) / 0.18);
  --brand-faint: oklch(var(--brand-l) var(--brand-c) var(--brand-h) / 0.08);
  --brand-ink: oklch(0.18 0.05 var(--brand-h));
  --bg: #08080a; --bg-1: #0c0c0f; --bg-2: #111114; --bg-3: #16161a; --bg-4: #1d1d22;
  --line: rgba(255,255,255,0.07); --line-2: rgba(255,255,255,0.12); --line-bright: rgba(255,255,255,0.22);
  --ink: #f3f1ec; --ink-2: #c8c5bd; --ink-3: #8b877e; --ink-4: #5a574f;
  --pos: oklch(0.78 0.14 155); --neg: oklch(0.70 0.18 25); --warn: oklch(0.75 0.16 75); --info: oklch(0.65 0.14 230);
  --pos-soft: oklch(0.78 0.14 155 / 0.12); --neg-soft: oklch(0.70 0.18 25 / 0.12); --warn-soft: oklch(0.75 0.16 75 / 0.12); --info-soft: oklch(0.65 0.14 230 / 0.12);
  --f-sans: "Geist", ui-sans-serif, system-ui, sans-serif;
  --f-mono: "Geist Mono", ui-monospace, monospace;
  --r-1: 6px; --r-2: 10px; --r-3: 14px; --r-4: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.15);
  --shadow-lg: 0 10px 24px rgba(0,0,0,0.20);
  --card-bg: var(--bg-2);
  --preview-bg: var(--bg-1);
  --sidebar-w: 260px;
  color-scheme: dark;
}
:root[data-theme="light"] {
  --bg: #faf8f3; --bg-1: #f4f1e9; --bg-2: #ece8dd; --bg-3: #e2ddcf; --bg-4: #d4ceba;
  --line: rgba(20,18,14,0.08); --line-2: rgba(20,18,14,0.14); --line-bright: rgba(20,18,14,0.28);
  --ink: #14120e; --ink-2: #44403a; --ink-3: #78736a; --ink-4: #a8a294;
  --brand-l: 0.62; --brand-c: 0.16;
  --pos: oklch(0.52 0.14 155); --neg: oklch(0.50 0.18 25); --warn: oklch(0.55 0.14 75); --info: oklch(0.50 0.14 230);
  --pos-soft: oklch(0.78 0.14 155 / 0.12); --neg-soft: oklch(0.70 0.18 25 / 0.12); --warn-soft: oklch(0.75 0.16 75 / 0.12); --info-soft: oklch(0.65 0.14 230 / 0.12);
  --ink-4: #8a8478;
  --card-bg: #fff;
  --preview-bg: var(--bg);
  color-scheme: light;
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--f-sans); background: var(--bg); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; overflow: hidden; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; cursor: pointer; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink-4); border-radius: 99px; }

/* ═══════════════════════════════════════════
   LOADING OVERLAY
   ═══════════════════════════════════════════ */
.loading-overlay {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0B0F19;
  transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
  overflow: hidden;
}
.loading-overlay.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

/* Grid */
.lo-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black, transparent);
  -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 50%, black, transparent);
  animation: loGridFade 2s ease-out forwards;
}
@keyframes loGridFade { from { opacity: 0; } to { opacity: 1; } }

/* Ambient glow */
.lo-glow {
  position: absolute; width: 500px; height: 500px; border-radius: 50%;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: radial-gradient(circle, var(--lo-color, #7B5BFF) 0%, transparent 70%);
  opacity: 0.08;
  animation: loGlowPulse 3s ease-in-out infinite;
}
@keyframes loGlowPulse { 0%, 100% { opacity: 0.06; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.12; transform: translate(-50%, -50%) scale(1.1); } }

/* Center hub */
.lo-center { position: relative; z-index: 5; display: flex; flex-direction: column; align-items: center; gap: 0; }

/* Orb */
.lo-orb-wrap { position: relative; width: 64px; height: 64px; margin-bottom: 40px; }
.lo-orb {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--lo-color, #7B5BFF);
  animation: loOrbPulse 2.4s ease-in-out infinite;
}
@keyframes loOrbPulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.08); opacity: 1; } }
.lo-orb-ring {
  position: absolute; inset: -12px; border-radius: 50%;
  border: 1px solid var(--lo-color, #7B5BFF);
  opacity: 0.15; animation: loRingExpand 2.4s ease-in-out infinite;
}
.lo-orb-ring:nth-child(3) { inset: -24px; opacity: 0.08; animation-delay: 0.4s; }
@keyframes loRingExpand { 0%, 100% { transform: scale(1); opacity: 0.15; } 50% { transform: scale(1.06); opacity: 0.08; } }

/* Floating UI fragments */
.lo-fragments { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
.lo-frag {
  position: absolute; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.02);
  backdrop-filter: blur(1px);
  opacity: 0;
  animation: loFragIn 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
@keyframes loFragIn { to { opacity: 1; transform: translateY(0); } }

/* Color swatches that appear */
.lo-swatches {
  position: absolute; z-index: 4;
  display: flex; gap: 4px;
  opacity: 0; animation: loSwatchIn 0.8s ease forwards;
}
@keyframes loSwatchIn { to { opacity: 1; transform: translateY(0) scale(1); } }
.lo-swatch { width: 20px; height: 20px; border-radius: 4px; }

/* Alignment guides */
.lo-guide {
  position: absolute; z-index: 2; opacity: 0;
  animation: loGuideIn 0.6s ease forwards;
}
.lo-guide--h { height: 1px; background: var(--lo-color, #7B5BFF); }
.lo-guide--v { width: 1px; background: var(--lo-color, #7B5BFF); }
@keyframes loGuideIn { to { opacity: 0.12; } }

/* Text */
.lo-text {
  font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.5);
  letter-spacing: 0.03em;
  transition: opacity 0.6s ease;
}
.lo-step {
  font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 8px;
  font-family: var(--f-mono);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

/* Progress */
.lo-progress { width: 160px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; margin-top: 28px; overflow: hidden; }
.lo-progress-fill { height: 100%; width: 0; background: var(--lo-color, #7B5BFF); border-radius: 1px; transition: width 0.3s ease; }

/* Floating vars */
.lo-var {
  position: absolute; z-index: 3; font-size: 10px; font-family: var(--f-mono);
  color: rgba(255,255,255,0.12); opacity: 0; white-space: nowrap;
  animation: loVarIn 0.8s ease forwards;
}
@keyframes loVarIn { to { opacity: 1; } }

/* ═══════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════ */
.sidebar {
  position: fixed; left: 0; top: 0; width: var(--sidebar-w); height: 100vh;
  background: var(--bg-1); border-right: 1px solid var(--line);
  display: flex; flex-direction: column; z-index: 100;
  overflow-y: auto; overflow-x: hidden;
}
:root[data-theme="light"] .sidebar { background: #fff; }
.sidebar__logo { display: flex; align-items: center; gap: 0; padding: 16px 20px; font-family: "Finlandica Headline", sans-serif; font-size: 28px; font-weight: 500; color: var(--ink); }
.sidebar__logo .brand-accent { color: var(--brand); }
.sidebar__divider { height: 1px; background: var(--line); margin: 0 16px; }
.sidebar__section { padding: 14px 16px 10px; }
.sidebar__label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-4); margin-bottom: 8px; display: block; }
.sidebar__color-row { display: flex; align-items: center; gap: 6px; }
.sidebar__color-row .hash { font-size: 13px; color: var(--ink-4); font-family: var(--f-mono); }
.sidebar__color-row input[type="text"] {
  flex: 1; height: 44px; padding: 0 10px; border: 1px solid var(--line-2); border-radius: var(--r-1);
  font-family: var(--f-mono); font-size: 13px; color: var(--ink); background: var(--bg-2);
  outline: none; text-transform: uppercase; min-width: 0;
}
:root[data-theme="light"] .sidebar__color-row input[type="text"] { background-color: #fff; }
:root[data-theme="light"] .sidebar__font-select { background-color: #fff; }
.sidebar__color-row input[type="text"]:focus { border-color: var(--brand); }
.sidebar__swatch {
  width: 44px; height: 44px; border-radius: var(--r-1); background: var(--brand);
  border: 1px solid var(--line-2); cursor: pointer; flex-shrink: 0; position: relative;
}
.sidebar__swatch input[type="color"] {
  position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
}
.sidebar__font-select {
  width: 100%; height: 44px; padding: 0 28px 0 10px; border: 1px solid var(--line-2); border-radius: var(--r-1);
  font-size: 13px; font-weight: 500; color: var(--ink); background: var(--bg-2);
  outline: none; appearance: none; cursor: pointer;
  background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2344403a' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 12px center;
}
.sidebar__font-select:focus { border-color: var(--brand); }
:root[data-theme="dark"] .sidebar__font-select {
  background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23c8c5bd' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
}
:root[data-theme="dark"] .c-select {
  background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23c8c5bd' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
}
.sidebar__theme-row { display: flex; align-items: center; gap: 2px; padding: 3px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 99px; }
.sidebar__theme-btn { display: grid; place-items: center; width: 28px; height: 26px; border: none; background: none; border-radius: 99px; color: var(--ink-4); cursor: pointer; transition: all 0.15s; }
.sidebar__theme-btn svg { width: 14px; height: 14px; }
.sidebar__theme-btn.active { background: var(--bg-4); color: var(--ink); }
:root[data-theme="light"] .sidebar__theme-btn.active { background: var(--bg-3); }

.sidebar__nav { flex: 1; padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
.sidebar__nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: var(--r-2); font-size: 15px; font-weight: 400;
  color: var(--ink-3); text-decoration: none; transition: all 0.12s;
}
.sidebar__nav a:hover { background: var(--bg-2); color: var(--ink); }
:root[data-theme="light"] .sidebar__nav a:hover { background: var(--bg-2); }
.sidebar__nav a.active { background: var(--brand-faint); color: var(--brand-text, var(--brand)); font-weight: 500; }
.sidebar__nav-num { font-size: 10px; font-family: var(--f-mono); font-weight: 600; color: var(--ink-4); min-width: 18px; }

.sidebar__bottom { padding: 12px 16px; border-top: 1px solid var(--line); }
.sidebar__export-btn {
  width: 100%; height: 36px; border: none; border-radius: var(--r-2);
  background: var(--brand); color: var(--brand-ink);
  font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.sidebar__export-btn:hover { opacity: 0.9; }
.sidebar__export-btn svg { width: 16px; height: 16px; }
.sidebar__home-link { display: block; text-align: center; font-size: 11px; color: var(--ink-4); margin-top: 8px; }
.sidebar__home-link:hover { color: var(--ink-2); }

/* ═══════════════════════════════════════════
   MAIN CONTENT
   ═══════════════════════════════════════════ */
.main-content {
  margin-left: var(--sidebar-w); height: 100vh; overflow-y: auto;
  background: radial-gradient(900px 500px at 50% -60px, var(--brand-faint), transparent 60%), var(--bg);
}
.ds-body { max-width: 1000px; margin: 0 auto; padding: 32px 32px 100px; }

/* ═══════════════════════════════════════════
   HERO
   ═══════════════════════════════════════════ */
.ds-hero { background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--r-3); padding: 40px 36px; margin-bottom: 40px; position: relative; overflow: hidden; }
.hero__theme-toggle { position: absolute; top: 16px; right: 16px; z-index: 2; display: flex; align-items: center; gap: 2px; padding: 3px; background: var(--bg-3); border: 1px solid var(--line); border-radius: 99px; }
:root[data-theme="light"] .hero__theme-toggle { background: var(--bg-2); }
.ds-hero::before { content: ''; position: absolute; top: -80px; right: -40px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, var(--brand-soft), transparent 70%); }
.ds-hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; position: relative; z-index: 1; }
.ds-hero p { font-size: 14px; color: var(--ink-3); max-width: 560px; line-height: 1.7; position: relative; z-index: 1; }
.ds-hero p strong { color: var(--brand-text, var(--brand)); font-weight: 600; }
.ds-hero-stats { display: flex; gap: 32px; margin-top: 24px; position: relative; z-index: 1; }
.ds-hero-stat-val { font-size: 20px; font-weight: 700; }
.ds-hero-stat-label { font-size: 11px; color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.hero__chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; position: relative; z-index: 1; }
.hero__chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 600; font-family: var(--f-mono); background: var(--bg-3); border: 1px solid var(--line); color: var(--ink-3); }
.hero__chip--ok { border-color: oklch(0.78 0.14 155 / 0.3); color: oklch(0.55 0.14 155); }
.hero__chip--warn { border-color: oklch(0.75 0.16 75 / 0.3); color: oklch(0.55 0.14 75); }
:root[data-theme="dark"] .hero__chip--ok { color: oklch(0.78 0.14 155); }
:root[data-theme="dark"] .hero__chip--warn { color: oklch(0.75 0.16 75); }

/* ═══════════════════════════════════════════
   SECTIONS
   ═══════════════════════════════════════════ */
.ds-section { margin-bottom: 48px; }
.ds-section-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
.ds-section-num { font-size: 11px; font-weight: 700; color: var(--ink-4); background: var(--bg-2); padding: 3px 10px; border-radius: 6px; letter-spacing: 0.5px; font-family: var(--f-mono); }
:root[data-theme="light"] .ds-section-num { background: var(--bg-3); }
.ds-section-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.ds-section-desc { font-size: 13px; color: var(--ink-3); max-width: 640px; margin-bottom: 20px; line-height: 1.7; }
.ds-subsection { margin-bottom: 28px; }
.ds-subsection-title { font-size: 14px; font-weight: 600; color: var(--ink-2); margin-bottom: 12px; letter-spacing: -0.1px; }

/* ── Preview Card ── */
.ds-preview { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--r-3); padding: 24px; margin-bottom: 12px; }
.ds-preview-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ink-4); margin-bottom: 12px; }
.ds-preview-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
.ds-preview-col { display: flex; flex-direction: column; gap: 12px; }

/* ── Code Spec ── */
.ds-spec { background: #0a0a0c; color: #c8c5bd; border-radius: var(--r-2); padding: 14px 18px; font-family: var(--f-mono); font-size: 12px; line-height: 1.8; overflow-x: auto; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.06); }
.ds-spec .k { color: var(--brand-text, var(--brand)); }
.ds-spec .v { color: oklch(0.82 0.12 85); }
.ds-spec .c { color: #5a574f; font-style: italic; }

/* ═══════════════════════════════════════════
   1. COLORS
   ═══════════════════════════════════════════ */
.color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.color-ramp { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--r-3); overflow: hidden; }
.color-ramp-header { padding: 12px 16px; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--line); }
.color-ramp-swatches { display: flex; flex-direction: column; }
.color-swatch-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; font-size: 12px; }
.color-swatch-row:hover { opacity: 0.9; }
.color-swatch-label { font-weight: 500; }
.color-swatch-hex { font-family: var(--f-mono); font-size: 11px; opacity: 0.7; }

.palette-row { display: flex; gap: 0; border-radius: var(--r-3); overflow: hidden; border: 1px solid var(--line); }
.swatch { flex: 1; min-height: 80px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; font-size: 11px; font-weight: 600; position: relative; }
.swatch__label { font-family: var(--f-mono); }
.swatch__hex { font-family: var(--f-mono); font-size: 10px; opacity: 0.7; }

/* ═══════════════════════════════════════════
   2. TYPOGRAPHY
   ═══════════════════════════════════════════ */
.type-specimen { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
.type-specimen:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.type-specimen-label { font-size: 10px; font-weight: 600; color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-family: var(--f-mono); }
.type-specimen-meta { font-size: 11px; color: var(--ink-4); margin-top: 4px; font-family: var(--f-mono); }

/* ═══════════════════════════════════════════
   3. SPACING
   ═══════════════════════════════════════════ */
.space-demo { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
.space-bar { background: var(--brand-soft); border-radius: 4px; height: 20px; border: 1px solid var(--brand-faint); }
.space-label { font-size: 12px; font-weight: 600; min-width: 32px; color: var(--ink-2); font-family: var(--f-mono); }
.space-value { font-size: 11px; color: var(--ink-4); font-family: var(--f-mono); min-width: 40px; }

/* ═══════════════════════════════════════════
   4. ELEVATION
   ═══════════════════════════════════════════ */
.elevation-demo { display: flex; align-items: center; justify-content: center; width: 120px; height: 80px; border-radius: var(--r-3); font-size: 11px; color: var(--ink-3); text-align: center; line-height: 1.4; }
.radius-grid { display: flex; flex-wrap: wrap; gap: 20px; }
.radius-cell { text-align: center; }
.radius-box { width: 56px; height: 56px; background: var(--brand); border: 2px solid var(--brand); margin-bottom: 6px; }
.radius-name { font-size: 11px; color: var(--ink-2); font-weight: 500; }
.radius-val { font-size: 10px; color: var(--ink-4); font-family: var(--f-mono); }

/* ═══════════════════════════════════════════
   5. COMPONENTS
   ═══════════════════════════════════════════ */
.c-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; height: 36px; padding: 0 16px; border-radius: var(--r-2); font-family: inherit; font-size: 13px; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; }

/* Inputs */

/* Select */
.c-select { height: 44px; padding: 0 36px 0 12px; border: 1px solid var(--line-2); border-radius: var(--r-2); font-family: inherit; font-size: 13px; color: var(--ink); background: var(--bg-1); outline: none; width: 100%; appearance: none; cursor: pointer; background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2344403a' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; }

/* Textarea */

/* Badge */

/* Alert */

.c-alert svg { width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px; }
.c-alert--pos { background: var(--pos-soft); color: var(--pos); }
.c-alert--neg { background: var(--neg-soft); color: var(--neg); }

/* Avatar */

/* Metric Card */
.metric-card { background: var(--bg-2); border-radius: var(--r-2); padding: 16px; }

/* Tabs */

/* Sidebar demo */

/* Dropdown */
.dropdown-menu { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--r-2); box-shadow: var(--shadow-md); padding: 6px; min-width: 180px; display: inline-block; }
.dropdown-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; font-size: 13px; color: var(--ink-2); cursor: pointer; transition: background 0.1s; }

.dropdown-item svg { width: 16px; height: 16px; color: var(--ink-4); }
.dropdown-divider { height: 1px; background: var(--line); margin: 4px 0; }

/* Modal */
.modal-backdrop { background: rgba(0,0,0,0.5); border-radius: var(--r-3); padding: 40px; display: flex; align-items: center; justify-content: center; min-height: 320px; }

/* Tag / Chip */
.c-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; border: 1px solid var(--line-2); color: var(--ink-2); background: var(--card-bg); }

.c-tag-remove:hover { color: var(--neg); }

/* Progress */
.progress-track { width: 100%; height: 6px; background: var(--bg-3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

/* Skeleton */
.skeleton { background: linear-gradient(90deg, var(--bg-3) 25%, var(--bg-2) 50%, var(--bg-3) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }

.page-btn:hover { background: var(--bg-2); }

/* Period selector */

.period-btn.active { background: var(--brand); color: var(--brand-ink); }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; }
.empty-icon { color: var(--ink-4); margin-bottom: 12px; }
.empty-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }

/* Tooltip */
.tooltip-demo { position: relative; display: inline-flex; }
.tooltip-bubble { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--bg); padding: 6px 10px; border-radius: 6px; font-size: 12px; white-space: nowrap; }

/* Contrast grid */

.grade-AA-lg { background: var(--neg-soft); color: var(--neg); }

/* Surface cards */
.surface-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.surface-card { padding: 20px; border-radius: var(--r-3); border: 1px solid var(--line); }
.surface-card h4 { text-transform: uppercase; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 12px; }
.surface-strip { display: flex; gap: 4px; margin-bottom: 12px; }
.surface-chip { flex: 1; height: 32px; border-radius: 4px; }

   MATERIAL-STYLE COMPONENTS (Sections 11-16)

/* --- Cards & Containers --- */
.c-card { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--r-3); overflow: hidden; }
.c-card-media { width: 100%; height: 160px; background: linear-gradient(135deg, var(--brand-soft), var(--bg-3)); display: flex; align-items: center; justify-content: center; color: var(--ink-4); }

.c-bottom-sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--ink-4); margin: 10px auto; }

.c-divider { border: none; border-top: 1px solid var(--line); margin: 0; }

/* --- Selection & Input --- */

.c-datepicker { display: inline-flex; align-items: center; gap: 8px; }

.c-btn-toggle-group { display: inline-flex; border: 1px solid var(--line); border-radius: var(--r-2); overflow: hidden; }
.c-btn-toggle { padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--ink-3); background: var(--card-bg); border: none; border-right: 1px solid var(--line); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.c-btn-toggle:last-child { border-right: none; }
.c-btn-toggle:hover { background: var(--bg-2); color: var(--ink); }
.c-btn-toggle.active { background: var(--brand); color: var(--brand-ink); }

/* --- Lists & Data --- */
.c-list { list-style: none; padding: 0; margin: 0; }
.c-list-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--line); font-size: 13px; color: var(--ink-2); transition: background 0.1s; }

/* --- Indicators --- */

.c-badge-dot--brand { background: var(--brand); color: var(--brand-ink); }
.c-badge-dot--neg { background: var(--neg); color: #fff; }

.c-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 500; border: 1px solid var(--line-2); color: var(--ink-2); background: var(--card-bg); cursor: pointer; transition: all 0.12s; }
.c-chip:hover { background: var(--bg-3); }
.c-chip.selected { background: var(--brand-soft); border-color: var(--brand); color: var(--brand-text, var(--brand)); }
.c-chip-remove { display: flex; cursor: pointer; color: var(--ink-4); }
.c-chip-remove:hover { color: var(--neg); }

.c-progress { width: 100%; }
.c-progress-track { width: 100%; height: 6px; background: var(--bg-3); border-radius: 3px; overflow: hidden; position: relative; }
.c-progress-fill { height: 100%; border-radius: 3px; }
.c-progress-fill--brand { background: var(--brand); }
.c-progress-fill--pos { background: var(--pos); }
.c-progress-fill--warn { background: var(--warn); }
.c-progress-buffer { position: absolute; top: 0; left: 0; height: 100%; background: var(--brand-soft); border-radius: 3px; }
.c-progress-indeterminate { animation: progressIndeterminate 1.5s infinite ease-in-out; width: 40%; }
@keyframes progressIndeterminate { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

.c-spinner { border-radius: 50%; border: 3px solid var(--bg-3); border-top-color: var(--brand); animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.c-stepper { display: flex; align-items: flex-start; gap: 0; }
.c-step { display: flex; flex-direction: column; align-items: center; flex: 1; position: relative; }
.c-step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; border: 2px solid var(--line-2); color: var(--ink-3); background: var(--card-bg); z-index: 1; }
.c-step.completed .c-step-circle { background: var(--brand); border-color: var(--brand); color: var(--brand-ink); }
.c-step.active .c-step-circle { border-color: var(--brand); color: var(--brand); }
.c-step-label { font-size: 12px; font-weight: 500; color: var(--ink-3); margin-top: 8px; text-align: center; }
.c-step.completed .c-step-label, .c-step.active .c-step-label { color: var(--ink); }
.c-step-connector { position: absolute; top: 16px; left: calc(50% + 20px); right: calc(-50% + 20px); height: 2px; background: var(--line-2); }
.c-step.completed .c-step-connector { background: var(--brand); }

/* --- Overlays --- */
.c-dialog { background: var(--card-bg); border-radius: var(--r-3); box-shadow: var(--shadow-lg); max-width: 380px; width: 100%; border: 1px solid var(--line); }
.c-dialog-title { padding: 20px 24px 8px; font-size: 16px; font-weight: 600; }
.c-dialog-body { padding: 0 24px 20px; font-size: 13px; color: var(--ink-3); line-height: 1.6; }
.c-dialog-actions { padding: 8px 16px 16px; display: flex; justify-content: flex-end; gap: 8px; }

.c-snackbar { display: inline-flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--r-2); background: var(--ink); color: var(--bg); font-size: 13px; box-shadow: var(--shadow-md); }
.c-snackbar-action { font-size: 13px; font-weight: 600; color: var(--brand); cursor: pointer; background: none; border: none; font-family: inherit; }

.c-tooltip-wrap { position: relative; display: inline-flex; }
.c-tooltip { position: absolute; padding: 6px 10px; border-radius: 6px; background: var(--ink); color: var(--bg); font-size: 12px; white-space: nowrap; pointer-events: none; }
.c-tooltip--top { bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); }
.c-tooltip--top::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:var(--ink); }
.c-tooltip--right { left: calc(100% + 8px); top: 50%; transform: translateY(-50%); }
.c-tooltip--right::after { content:''; position:absolute; right:100%; top:50%; transform:translateY(-50%); border:5px solid transparent; border-right-color:var(--ink); }
.c-tooltip--bottom { top: calc(100% + 8px); left: 50%; transform: translateX(-50%); }
.c-tooltip--bottom::after { content:''; position:absolute; bottom:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-bottom-color:var(--ink); }
.c-tooltip--left { right: calc(100% + 8px); top: 50%; transform: translateY(-50%); }
.c-tooltip--left::after { content:''; position:absolute; left:100%; top:50%; transform:translateY(-50%); border:5px solid transparent; border-left-color:var(--ink); }

.c-menu { background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--r-2); box-shadow: var(--shadow-md); padding: 6px; min-width: 180px; }
.c-menu-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; font-size: 13px; color: var(--ink-2); cursor: pointer; transition: background 0.1s; }
.c-menu-item:hover { background: var(--brand-faint); }
.c-menu-item svg { width: 16px; height: 16px; color: var(--ink-4); }
.c-menu-item--sub { justify-content: space-between; }
.c-menu-divider { height: 1px; background: var(--line); margin: 4px 0; }
.c-submenu { position: absolute; left: 100%; top: -6px; }

/* --- Navigation Extended --- */
.c-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 56px; background: var(--card-bg); border: 1px solid var(--line); border-radius: var(--r-2); }
.c-toolbar-title { font-size: 16px; font-weight: 600; }
.c-toolbar-actions { display: flex; align-items: center; gap: 8px; }
.c-toolbar-icon { width: 36px; height: 36px; border-radius: var(--r-1); border: none; background: none; color: var(--ink-3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.c-toolbar-icon:hover { background: var(--bg-2); color: var(--ink); }

.c-sidenav { display: flex; border: 1px solid var(--line); border-radius: var(--r-2); overflow: hidden; height: 260px; }
.c-sidenav-drawer { width: 200px; background: var(--bg-2); border-right: 1px solid var(--line); padding: 8px; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
:root[data-theme="light"] .c-sidenav-drawer { background: var(--bg-1); }
.c-sidenav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--r-1); font-size: 13px; color: var(--ink-3); cursor: pointer; border: none; background: none; font-family: inherit; width: 100%; text-align: left; transition: all 0.12s; }
.c-sidenav-item:hover { background: var(--bg-3); color: var(--ink); }
:root[data-theme="light"] .c-sidenav-item:hover { background: var(--bg-2); }
.c-sidenav-item.active { background: var(--brand-faint); color: var(--brand-text, var(--brand)); font-weight: 500; }
.c-sidenav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.c-sidenav-body { flex: 1; padding: 20px; background: var(--card-bg); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--ink-3); }

.c-tabs { display: flex; border-bottom: 2px solid var(--line); gap: 0; }
.c-tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: var(--ink-3); cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; font-family: inherit; display: flex; align-items: center; gap: 6px; }
.c-tab:hover { color: var(--ink); }
.c-tab.active { color: var(--brand-text, var(--brand)); border-bottom-color: var(--brand); }
.c-tab svg { width: 16px; height: 16px; }

.c-paginator { display: flex; align-items: center; gap: 16px; font-size: 13px; color: var(--ink-2); }
.c-paginator-select { padding: 6px 10px; border-radius: var(--r-1); border: 1px solid var(--line); background: var(--card-bg); color: var(--ink); font-size: 12px; font-family: inherit; }
.c-paginator-actions { display: flex; gap: 4px; }
.c-paginator-btn { width: 32px; height: 32px; border-radius: var(--r-1); border: 1px solid var(--line); background: var(--card-bg); color: var(--ink-2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.c-paginator-btn:hover { background: var(--bg-2); }
.c-paginator-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media (max-width: 900px) {
  :root { --sidebar-w: 220px; }
  .ds-body { padding: 24px 20px 100px; }
}
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none; }
  body { overflow: auto; }
  .main-content { margin-left: 0; height: auto; }
  .ds-hero { padding: 28px 20px; }
  .ds-hero h1 { font-size: 22px; }
  .ds-hero-stats { gap: 20px; flex-wrap: wrap; }
  .surface-pair { grid-template-columns: 1fr; }
  .palette-row { flex-wrap: wrap; }
  .swatch { min-width: 60px; }
}
</style>
</head>

<script src="engine.js"></script>
<script>
(function() {
  /* ═══ Font catalogue ═══ */
  var FONTS = [
    { id:"geist", name:"Geist", sans:"Geist", mono:"Geist Mono", tag:"Modern", googleUrl:null, cssVar:'"Geist", ui-sans-serif, sans-serif', monoVar:'"Geist Mono", ui-monospace, monospace' },
    { id:"inter", name:"Inter", sans:"Inter", mono:"JetBrains Mono", tag:"Neutral", googleUrl:"https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap", cssVar:'"Inter", ui-sans-serif, sans-serif', monoVar:'"JetBrains Mono", ui-monospace, monospace' },
    { id:"plus-jakarta", name:"Plus Jakarta", sans:"Plus Jakarta Sans", mono:"Space Mono", tag:"Friendly", googleUrl:"https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap", cssVar:'"Plus Jakarta Sans", ui-sans-serif, sans-serif', monoVar:'"Space Mono", ui-monospace, monospace' },
    { id:"dm-sans", name:"DM Sans", sans:"DM Sans", mono:"IBM Plex Mono", tag:"Clean", googleUrl:"https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap", cssVar:'"DM Sans", ui-sans-serif, sans-serif', monoVar:'"IBM Plex Mono", ui-monospace, monospace' },
    { id:"outfit", name:"Outfit", sans:"Outfit", mono:"Fira Code", tag:"Geometric", googleUrl:"https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap", cssVar:'"Outfit", ui-sans-serif, sans-serif', monoVar:'"Fira Code", ui-monospace, monospace' },
    { id:"playfair", name:"Playfair", sans:"Playfair Display", mono:"DM Mono", tag:"Editorial", googleUrl:"https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap", cssVar:'"Playfair Display", Georgia, serif', monoVar:'"DM Mono", ui-monospace, monospace' }
  ];

  var root = document.documentElement;
  var overlay = document.getElementById("loadingOverlay");
  var bar = document.getElementById("loadingBar");
  var stepEl = document.getElementById("loadingStep");
  var mainContent = document.getElementById("mainContent");
  var sidebar = document.getElementById("sidebar");

  /* ═══ Determine if we need to generate ═══ */
  var params = new URLSearchParams(window.location.search);
  var brandParam = params.get("brand");
  var dsRaw = localStorage.getItem("pp-ds");
  var needsGeneration = !dsRaw || brandParam;

  var hex = brandParam ? ("#" + brandParam.replace("#","")) : (localStorage.getItem("pp-brand") || "#E8B26B");
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) hex = "#E8B26B";

  var fontConf;
  try { fontConf = JSON.parse(localStorage.getItem("pp-font")); } catch(e) {}
  if (!fontConf) fontConf = FONTS[0];

  /* ═══ Loading animation ═══ */
  function runLoadingAnimation(brandHex, callback) {
    var rgb = PPEngine.hexToRgb(brandHex);
    var r = Math.round(rgb[0]*255), g = Math.round(rgb[1]*255), b = Math.round(rgb[2]*255);
    var brandCSS = brandHex;

    overlay.style.setProperty("--lo-color", brandCSS);
    document.querySelector(".lo-orb").style.background = brandCSS;
    document.querySelector(".lo-glow").style.background = "radial-gradient(circle, " + brandCSS + " 0%, transparent 70%)";

    var fragContainer = document.getElementById("loFragments");
    fragContainer.innerHTML = "";

    var fragments = [
      { w: 80, h: 28, x: "18%", y: "30%", delay: 0.6, ty: 20, label: "" },
      { w: 120, h: 14, x: "70%", y: "25%", delay: 0.9, ty: -15, label: "" },
      { w: 60, h: 60, x: "75%", y: "55%", delay: 1.2, ty: 12, label: "" },
      { w: 100, h: 20, x: "15%", y: "65%", delay: 1.5, ty: -10, label: "" },
      { w: 40, h: 40, x: "25%", y: "45%", delay: 1.0, ty: 18, label: "" },
      { w: 90, h: 12, x: "65%", y: "72%", delay: 1.8, ty: -8, label: "" }
    ];
    fragments.forEach(function(f) {
      var el = document.createElement("div");
      el.className = "lo-frag";
      el.style.cssText = "width:" + f.w + "px;height:" + f.h + "px;left:" + f.x + ";top:" + f.y + ";animation-delay:" + f.delay + "s;transform:translateY(" + f.ty + "px);";
      fragContainer.appendChild(el);
    });

    var palette = PPEngine.generate(brandHex);
    var brandShades = palette.color.brand;
    var shadeKeys = [100, 300, 500, 700, 900];
    var swatchPositions = [
      { x: "12%", y: "52%", delay: 2.2 },
      { x: "80%", y: "40%", delay: 2.5 }
    ];
    swatchPositions.forEach(function(pos) {
      var row = document.createElement("div");
      row.className = "lo-swatches";
      row.style.cssText = "left:" + pos.x + ";top:" + pos.y + ";animation-delay:" + pos.delay + "s;transform:translateY(8px) scale(0.9);";
      shadeKeys.forEach(function(k) {
        var sw = document.createElement("div");
        sw.className = "lo-swatch";
        sw.style.background = brandShades[k].hex;
        row.appendChild(sw);
      });
      fragContainer.appendChild(row);
    });

    var guides = [
      { cls: "lo-guide--h", css: "width:180px;left:calc(50% - 220px);top:38%;animation-delay:1.6s;" },
      { cls: "lo-guide--h", css: "width:140px;left:calc(50% + 80px);top:62%;animation-delay:2.0s;" },
      { cls: "lo-guide--v", css: "height:120px;left:38%;top:calc(50% - 60px);animation-delay:1.8s;" },
      { cls: "lo-guide--v", css: "height:80px;left:62%;top:calc(50% - 20px);animation-delay:2.2s;" }
    ];
    guides.forEach(function(g) {
      var el = document.createElement("div");
      el.className = "lo-guide " + g.cls;
      el.style.cssText = g.css;
      fragContainer.appendChild(el);
    });

    var vars = [
      { text: "--brand-500", x: "10%", y: "22%", delay: 2.6 },
      { text: "--radius-md: 6px", x: "78%", y: "78%", delay: 3.0 },
      { text: "--spacing-4: 16px", x: "72%", y: "18%", delay: 3.2 },
      { text: "--font-size-body: 16px", x: "8%", y: "76%", delay: 3.4 }
    ];
    vars.forEach(function(v) {
      var el = document.createElement("div");
      el.className = "lo-var";
      el.textContent = v.text;
      el.style.cssText = "left:" + v.x + ";top:" + v.y + ";animation-delay:" + v.delay + "s;";
      fragContainer.appendChild(el);
    });

    var steps = [
      { t: 0, text: "Analyzing brand color..." },
      { t: 1000, text: "Computing OKLCH palette..." },
      { t: 2000, text: "Building scalable components..." },
      { t: 3200, text: "Crafting visual harmony..." },
      { t: 4200, text: "Assembling design language..." }
    ];
    steps.forEach(function(s) {
      setTimeout(function() { stepEl.textContent = s.text; }, s.t);
    });

    var startTime = Date.now();
    var duration = 5000;
    var animId;
    function frame() {
      var elapsed = Date.now() - startTime;
      var progress = Math.min(elapsed / duration, 1);
      bar.style.width = (progress * 100) + "%";
      if (progress < 1) {
        animId = requestAnimationFrame(frame);
      } else {
        cancelAnimationFrame(animId);
        setTimeout(callback, 300);
      }
    }
    animId = requestAnimationFrame(frame);
  }

  function revealPage() {
    overlay.classList.add("fade-out");
    sidebar.style.opacity = "1";
    sidebar.style.transition = "opacity 0.4s ease";
    mainContent.style.opacity = "1";
    mainContent.style.transition = "opacity 0.4s ease 0.1s";
    setTimeout(function() { overlay.style.display = "none"; }, 700);
  }

  /* ═══ Generate + render ═══ */
  function generateDS(brandHex, font) {
    var ds = PPEngine.generate(brandHex, font);
    try {
      localStorage.setItem("pp-ds", JSON.stringify(ds));
      localStorage.setItem("pp-brand", brandHex);
      localStorage.setItem("pp-font", JSON.stringify(font));
    } catch(e) {}
    return ds;
  }

  var ds;
  if (needsGeneration) {
    ds = generateDS(hex, fontConf);
    root.style.setProperty("--brand-h", ds.color.hue.toFixed(1));
    root.style.setProperty("--brand-c", Math.min(0.20, Math.max(0.06, ds.color.chroma)).toFixed(3));
    runLoadingAnimation(hex, function() {
      renderPreview(ds);
      revealPage();
    });
  } else {
    try { ds = JSON.parse(dsRaw); } catch(e) { ds = generateDS(hex, fontConf); }
    overlay.style.display = "none";
    sidebar.style.opacity = "1";
    mainContent.style.opacity = "1";
    renderPreview(ds);
  }

  /* ═══ Load Google font ═══ */
  function loadFont(font) {
    if (font.googleUrl) {
      var existing = document.querySelector('link[data-font]');
      if (existing) existing.remove();
      var link = document.createElement("link");
      link.rel = "stylesheet"; link.href = font.googleUrl; link.setAttribute("data-font", "1");
      document.head.appendChild(link);
    }
    root.style.setProperty("--f-sans", font.cssVar);
    root.style.setProperty("--f-mono", font.monoVar);
  }

  /* ═══ Theme toggle ═══ */
  var currentTheme = root.getAttribute("data-theme") || "dark";
  function setTheme(mode) {
    currentTheme = mode;
    root.setAttribute("data-theme", mode);
    try { localStorage.setItem("pp-theme", mode); } catch(e) {}
    document.querySelectorAll(".sidebar__theme-btn").forEach(function(btn) {
      btn.classList.toggle("active", btn.dataset.mode === mode);
    });
    if (!ds) return;
    var srcRgb = PPEngine.hexToRgb(ds.meta.source);
    var srcOklch = PPEngine.rgbToOklch(srcRgb[0], srcRgb[1], srcRgb[2]);
    var isDarkBrand = srcOklch.L < 0.65;
    var H = ds.color.hue;
    var brandC = Math.min(0.20, Math.max(0.06, ds.color.chroma));
    var brandL;

    if (isDarkBrand) {
      brandL = Math.max(0.30, srcOklch.L);
      root.style.setProperty("--brand-ink", "#fff");
      root.style.setProperty("--brand-text", mode === "light"
        ? "oklch(0.40 " + brandC.toFixed(3) + " " + H.toFixed(1) + ")"
        : "oklch(0.75 " + brandC.toFixed(3) + " " + H.toFixed(1) + ")");
    } else {

      {icon:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>',label:'Settings',active:false}
    ];
    sidenavItems.forEach(function(item) {
      h += '<button class="c-sidenav-item' + (item.active?' active':'') + '" onclick="this.parentElement.querySelectorAll(\'.c-sidenav-item\').forEach(function(b){b.classList.remove(\'active\')});this.classList.add(\'active\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">' + item.icon + '</svg>' + item.label + '</button>';
    });
    h += '</div><div class="c-sidenav-body">Select a section from the sidebar to view content.</div></div>';
    h += '</div></div>';

    h += '<div class="ds-subsection"><div class="ds-subsection-title">Tabs with icons</div><div class="ds-preview"><div style="max-width:520px">';
    h += '<div class="c-tabs">';
    h += '<button class="c-tab active" onclick="this.parentElement.querySelectorAll(\'.c-tab\').forEach(function(t){t.classList.remove(\'active\')});this.classList.add(\'active\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Gallery</button>';
    h += '<button class="c-tab" onclick="this.parentElement.querySelectorAll(\'.c-tab\').forEach(function(t){t.classList.remove(\'active\')});this.classList.add(\'active\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> Tokens</button>';
    h += '<button class="c-tab" onclick="this.parentElement.querySelectorAll(\'.c-tab\').forEach(function(t){t.classList.remove(\'active\')});this.classList.add(\'active\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Code</button>';
    h += '<button class="c-tab" onclick="this.parentElement.querySelectorAll(\'.c-tab\').forEach(function(t){t.classList.remove(\'active\')});this.classList.add(\'active\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Settings</button>';

    document.getElementById("app").innerHTML = h;
    bindInteractions();

  /* ═══ Bind interactive behaviors ═══ */
  function bindInteractions() {
    document.querySelectorAll(".period-group").forEach(function(group) {
      group.querySelectorAll(".period-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          this.parentElement.querySelectorAll(".period-btn").forEach(function(b) { b.classList.remove("active"); });
          this.classList.add("active");
        });
      });
    });
    document.querySelectorAll(".tabs-bar").forEach(function(bar) {
      bar.querySelectorAll(".tab-item").forEach(function(tab) {
        tab.addEventListener("click", function() {
          this.parentElement.querySelectorAll(".tab-item").forEach(function(t) { t.classList.remove("active"); });
          this.classList.add("active");
        });
      });
    });
    document.querySelectorAll(".sidebar-demo").forEach(function(sb) {
      sb.querySelectorAll(".sidebar-item").forEach(function(item) {
        item.addEventListener("click", function() {
          this.parentElement.querySelectorAll(".sidebar-item").forEach(function(i) { i.classList.remove("active"); });
          this.classList.add("active");
        });
      });
    });
    document.querySelectorAll(".pagination").forEach(function(pag) {
      pag.querySelectorAll(".page-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          if (this.textContent === "..." || this.querySelector("svg")) return;
          this.parentElement.querySelectorAll(".page-btn").forEach(function(b) { b.classList.remove("active"); });
          this.classList.add("active");
        });
      });
    });

    /* Scroll spy for sidebar nav */
    var sections = document.querySelectorAll(".ds-section[id]");
    var navLinks = document.querySelectorAll(".sidebar__nav a");
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          navLinks.forEach(function(l) { l.classList.remove("active"); });
          var active = document.querySelector('.sidebar__nav a[href="#' + entry.target.id + '"]');
          if (active) active.classList.add("active");
        }
      });
    }, { root: mainContent, rootMargin: "-20% 0px -70% 0px" });
    sections.forEach(function(s) { obs.observe(s); });

    navLinks.forEach(function(a) {
      a.addEventListener("click", function(e) {
        e.preventDefault();
        var id = this.getAttribute("href").replace("#","");
        var target = document.getElementById(id);
        if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });
  }

})();
</script>
